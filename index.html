<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VectorScope — Stereo Camera Homography Visualizer</title>
<!--
  VectorScope — Stereo Camera Homography Visualizer
  ==================================================
  Two-row layout:
    Top row:    Bird's Eye (canvas) | Object Info (DOM) | Controls (DOM)
    Bottom row: Main Camera | UW Camera | Tele Camera | Combined (all canvas)

  See architecture.md for the full system design document.
-->
<style>
/* ── Global Reset & Body ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e; color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; height: 100vh; user-select: none;
}

/* ── App Layout: single viewport fills the entire window ── */
#app { display: flex; flex-direction: column; height: 100vh; }
#viewport-container { flex: 1; position: relative; overflow: hidden; }
#main-canvas { display: block; width: 100%; height: 100%; }

/* ── DOM Overlay Panels (top row: info + controls) ── */
#panel-info, #panel-controls {
    position: absolute;
    background: rgba(22, 33, 62, 0.92);
    border-left: 1px solid #0f3460;
    border-bottom: 1px solid #0f3460;
    padding: 10px 12px;
    overflow-y: auto;
    z-index: 10;
    /* JS sets left, top, width, height */
}
#panel-info .panel-title, #panel-controls .panel-title {
    font-size: 11px; color: #888; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
}

/* ── Control rows inside the controls panel ── */
.ctrl-row {
    display: flex; align-items: center; gap: 4px;
    margin-bottom: 6px; flex-wrap: wrap;
}

/* ── Shared UI elements ── */
.cg { display: flex; align-items: center; gap: 3px; }
label { font-size: 12px; color: #aaa; }
button {
    padding: 3px 10px; background: #0f3460; color: #e0e0e0;
    border: 1px solid #533483; border-radius: 4px; cursor: pointer;
    font-size: 12px; transition: background .15s;
}
button:hover { background: #533483; }
button.active { background: #e94560; border-color: #e94560; }
.sld-btn {
    padding: 1px 6px; font-size: 14px; line-height: 1;
    background: #0f3460; border: 1px solid #533483; border-radius: 3px;
    color: #e0e0e0; cursor: pointer; font-weight: bold;
}
.sld-btn:hover { background: #533483; }
.zp-btn { padding: 2px 7px; font-size: 11px; font-family: monospace; }
.zp-btn.active { background: #e94560; border-color: #e94560; }
input[type="range"] { width: 100px; accent-color: #e94560; }
select {
    padding: 2px 6px; background: #0f3460; color: #e0e0e0;
    border: 1px solid #533483; border-radius: 4px; font-size: 12px;
    max-width: 120px;
}
input[type="file"] { display: none; }
.val {
    min-width: 40px; text-align: right; font-size: 12px;
    color: #e94560; font-family: monospace;
}
.sep { width: 1px; height: 18px; background: #0f3460; }
#selinfo { font-size: 12px; color: #aaa; }
/* Inline camera parameter inputs in info panel */
.cam-inp {
    width: 58px; padding: 1px 4px; margin: 0 2px;
    background: #0a0f1e; color: #e0e0e0; border: 1px solid #533483;
    border-radius: 3px; font-family: monospace; font-size: 11px; text-align: right;
}
.cam-inp:focus { outline: none; border-color: #e94560; }
.cam-lbl { color: #888; font-size: 10px; margin-right: 1px; }

/* ── Panel labels: positioned absolutely over the canvas ── */
.plbl {
    position: absolute; padding: 3px 10px;
    background: rgba(15,52,96,.85); border-radius: 3px;
    font-size: 11px; pointer-events: none; z-index: 10; white-space: nowrap;
}

/* ── Red border outline around each camera view ── */
.pborder {
    position: absolute; box-sizing: border-box;
    border: 2px solid #ff2b2b;
    pointer-events: none; z-index: 8;
}

/* ── Panel separators ── */
.panel-sep-v {
    position: absolute; top: 0; width: 2px;
    background: #e94560; pointer-events: none; z-index: 5; opacity: 0.7;
}
.panel-sep-h {
    position: absolute; left: 0; width: 100%; height: 2px;
    background: #e94560; pointer-events: none; z-index: 5; opacity: 0.7;
}

/* ── Homography Matrix HUD (top-right of Combined panel) ── */
#hmat {
    position: fixed; bottom: 16px; right: 16px;
    padding: 8px 12px; background: rgba(15,52,96,.92);
    border: 1px solid #533483; border-radius: 6px;
    font-family: monospace; font-size: 11px; color: #e0e0e0;
    pointer-events: none; z-index: 20; white-space: pre; line-height: 1.5;
}
/* ── Status HUD ── */
#status {
    position: fixed; bottom: 100px; right: 16px;
    padding: 4px 10px; background: rgba(15,52,96,.9);
    border-radius: 4px; font-size: 11px; color: #888;
    pointer-events: none; z-index: 20;
}

/* ── Camera Settings Dialog ── */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,.6); z-index: 100; justify-content: center; align-items: center;
}
.modal-overlay.open { display: flex; }
.modal {
    background: #16213e; border: 1px solid #533483; border-radius: 8px;
    padding: 20px; min-width: 520px; max-width: 90vw; max-height: 85vh;
    overflow-y: auto; color: #e0e0e0; font-size: 13px;
}
.modal h2 { margin: 0 0 14px; font-size: 16px; color: #e94560; }
.modal h3 { margin: 12px 0 6px; font-size: 13px; color: #4fc3f7; border-bottom: 1px solid #0f3460; padding-bottom: 4px; }
.modal table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
.modal td { padding: 3px 8px; font-family: monospace; font-size: 12px; }
.modal td:first-child { color: #aaa; width: 140px; }
.modal td:last-child { color: #e0e0e0; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
.modal-actions button { padding: 6px 16px; }
.modal input[type="number"] {
    width: 80px; padding: 2px 6px; background: #0a0f1e; color: #e0e0e0;
    border: 1px solid #533483; border-radius: 3px; font-family: monospace;
    font-size: 12px; text-align: right;
}
.modal input[type="number"]:focus { outline: none; border-color: #e94560; }
.cam-field { display: inline-flex; align-items: center; gap: 4px; }
.cam-field label { color: #888; font-size: 11px; min-width: 14px; }
</style>
</head>
<body>
<div id="app">
  <div id="viewport-container">
    <canvas id="main-canvas"></canvas>

    <!-- Top row: DOM overlay panels (info + controls) -->
    <div id="panel-info">
      <div class="panel-title">Selection</div>
      <div class="ctrl-row" style="margin-bottom:8px">
        <label>Ghost Y:</label>
        <button class="sld-btn" onclick="nudge('sld-clip',-1)">&minus;</button>
        <input type="range" id="sld-clip" min="0.3" max="8.0" step="0.1" value="2.0">
        <button class="sld-btn" onclick="nudge('sld-clip',1)">+</button>
        <span class="val" id="vclip">2.0</span>
      </div>
      <span id="selinfo">Click object or camera in any panel</span>
      <div id="obj-depth-row" class="cg" style="margin-top:8px;display:none">
        <label>Obj Depth:</label>
        <button class="sld-btn" onclick="nudge('sld-od',-1)">&minus;</button>
        <input type="range" id="sld-od" min="-10" max="30" step="0.1" value="3" disabled>
        <button class="sld-btn" onclick="nudge('sld-od',1)">+</button>
        <span class="val" id="vod">&mdash;</span>
      </div>
      <div id="obj-scale-row" class="cg" style="margin-top:8px;display:none">
        <label>Obj Scale:</label>
        <button class="sld-btn" onclick="nudge('sld-os',-1)">&minus;</button>
        <input type="range" id="sld-os" min="0.1" max="5" step="0.01" value="1" disabled>
        <button class="sld-btn" onclick="nudge('sld-os',1)">+</button>
        <span class="val" id="vos">&mdash;</span>
      </div>
      <div id="cam-detail" style="display:none;margin-top:8px;font-family:monospace;font-size:11px;line-height:1.6;color:#ccc;"></div>
    </div>

    <div id="panel-controls">
      <div class="panel-title">Controls</div>

      <!-- ═══════ GROUP: Per-Frame (recorded into trajectory per frame) ═══════
           These controls define the Combined view's output at any given frame.
           The recorder captures them every rendered frame; playback restores them. -->
      <div id="grp-perframe">
        <div class="ctrl-row">
          <label>Focus D:</label>
          <button class="sld-btn" onclick="nudge('sld-d',-1)">&minus;</button>
          <input type="range" id="sld-d" min="0.1" max="10" step="0.1" value="3">
          <button class="sld-btn" onclick="nudge('sld-d',1)">+</button>
          <span class="val" id="vd">3.0</span>
          <button id="btn-af" class="sld-btn" style="margin-left:4px;width:auto;padding:0 6px">AF</button>
        </div>
        <div class="ctrl-row">
          <label>Prewarp1:</label>
          <button class="sld-btn" onclick="nudge('sld-pw',-1)">&minus;</button>
          <input type="range" id="sld-pw" min="0.25" max="4.0" step="0.01" value="1.0">
          <button class="sld-btn" onclick="nudge('sld-pw',1)">+</button>
          <span class="val" id="vpw">1.00x</span>
        </div>
        <div class="ctrl-row">
          <label>Prewarp2:</label>
          <button class="sld-btn" onclick="nudge('sld-pw2',-1)">&minus;</button>
          <input type="range" id="sld-pw2" min="0.25" max="4.0" step="0.01" value="1.0">
          <button class="sld-btn" onclick="nudge('sld-pw2',1)">+</button>
          <span class="val" id="vpw2">1.00x</span>
        </div>
        <div class="ctrl-row">
          <label>Zoom:</label>
          <button class="sld-btn" onclick="nudge('sld-z',-1)">&minus;</button>
          <!-- log10 scale: -0.30103 → 0.5x, 0 → 1x, 1 → 10x -->
          <input type="range" id="sld-z" min="-0.30103" max="1" step="0.001" value="0">
          <button class="sld-btn" onclick="nudge('sld-z',1)">+</button>
          <span class="val" id="vz">1.00x</span>
        </div>
        <div class="ctrl-row" id="zoom-presets">
          <label>Go:</label>
          <button class="zp-btn" data-z="0.5">0.5x</button>
          <button class="zp-btn" data-z="1">1.0x</button>
          <button class="zp-btn" data-z="2">2.0x</button>
          <button class="zp-btn" data-z="5">5.0x</button>
          <button class="zp-btn" data-z="10">10x</button>
        </div>
        <div class="ctrl-row">
          <label>Blend:</label>
          <button class="sld-btn" onclick="nudge('sld-blend',-10)">&minus;</button>
          <!-- X = cross-fade length in frames after a camera switch; 0 = off -->
          <input type="range" id="sld-blend" min="0" max="60" step="1" value="20">
          <button class="sld-btn" onclick="nudge('sld-blend',10)">+</button>
          <span class="val" id="vblend">20f</span>
          <!-- Blend mode: Single = frozen outgoing frame; Dual = live follower RT -->
          <button id="btn-bmode" style="min-width:52px">Single</button>
        </div>
        <div class="ctrl-row">
          <button id="btn-warp">Warp</button>
          <button id="btn-setcam" onclick="openCamDialog()">Set Camera</button>
          <input type="file" id="fcam" accept=".json" style="display:none">
        </div>
      </div>

      <!-- ═══════ GROUP: Session (scene-level, NOT per-frame) ═══════
           These affect display/layout but not the Combined view's pixel output.
           Saved with the scene, but NOT recorded per-frame in trajectories. -->
      <div id="grp-session">
        <div class="ctrl-row">
          <button id="btn-combined" title="Focus mode: show only the Combined view">Combined</button>
          <button id="btn-fps" title="Fixed render rate; late frames are dropped, never queued">30 FPS</button>
          <button id="btn-play">&#9654; Play</button>
          <button id="btn-help" title="How to use VectorScope">Help</button>
        </div>
      </div>

      <!-- ═══════ GROUP: Trigger (stateless actions, never stored) ═══════
           One-shot operations: AF measures once, Reset restores defaults,
           Save/Load/Add/Delete are file ops. No per-frame or session state. -->
      <div id="grp-trigger">
        <div class="ctrl-row">
          <button id="btn-reset">Reset All</button>
          <button onclick="document.getElementById('fadd').click()">Add</button>
          <input type="file" id="fadd" multiple style="display:none"
                 accept=".glb,.gltf,.obj,.mtl,.png,.jpg,.jpeg,.gif,.webp,.bmp,.tga">
          <button id="btn-del">Delete</button>
          <button id="btn-save-scene">Save Scene</button>
          <button id="btn-load-scene">Load Scene</button>
        </div>
      </div>

      <!-- ═══════ GROUP: Trajectory (transport + record/playback) ═══════
           The trajectory system: load/save/record files, play/pause/step/seek.
           fps is trajectory-level metadata (not per-frame). -->
      <div id="grp-trajectory">
        <div class="ctrl-row" id="traj-row">
          <select id="sel-traj" title="Select trajectory (default = free mode)">
            <option value="__default__" selected>default</option>
          </select>
          <button id="btn-traj-load" title="Load a trajectory JSON file">Load</button>
          <input type="file" id="ftraj" accept=".json" style="display:none">
          <button id="btn-traj-save" title="Save the selected trajectory to disk">Save</button>
          <button id="btn-traj-rec" title="Start/stop recording a trajectory"
                  style="min-width:36px">&#9679; Rec</button>
        </div>
        <div class="ctrl-row" id="traj-transport-row">
          <button id="btn-traj-play" class="sld-btn" style="width:auto;padding:0 8px" disabled
                  title="Play / pause the selected trajectory">&#9654;</button>
          <button id="btn-traj-back" class="sld-btn" disabled title="Step one frame back">&#9198;</button>
          <button id="btn-traj-fwd" class="sld-btn" disabled title="Step one frame forward">&#9197;</button>
          <input type="range" id="sld-traj" min="0" max="0" step="1" value="0" disabled
                 title="Trajectory progress — drag to seek">
          <span class="val" id="vtraj" style="min-width:56px">&ndash;/&ndash;</span>
          <button id="btn-traj-stop" class="sld-btn" style="width:auto;padding:0 8px" disabled
                  title="Stop: back to free mode (built-in zoom rules)">&#9632;</button>
        </div>
      </div>
    </div>

    <!-- Panel labels (positioned by panels.js) -->
    <div class="plbl" id="lbl-bev" style="color:#ffb74d">&#9678; Bird's Eye</div>
    <div class="plbl" id="lbl-m" style="color:#4fc3f7">&#9678; Main Camera</div>
    <div class="plbl" id="lbl-s1" style="color:#81c784">&#9678; UW Camera</div>
    <div class="plbl" id="lbl-s2" style="color:#fff176">&#9678; Tele Camera</div>
    <div class="plbl" id="lbl-c" style="color:#e94560">&#9678; Combined &mdash; 1.00x</div>

    <!-- Separators -->
    <div class="panel-sep-h" id="sep-h"></div>
    <div class="panel-sep-v" id="sep-v1"></div>
    <div class="panel-sep-v" id="sep-v2"></div>
    <div class="panel-sep-v" id="sep-v3"></div>

    <!-- Red border outlines around each camera view (positioned by panels.js) -->
    <div class="pborder" id="bd-bev"></div>
    <div class="pborder" id="bd-m"></div>
    <div class="pborder" id="bd-s1"></div>
    <div class="pborder" id="bd-s2"></div>
    <div class="pborder" id="bd-c"></div>

    <!-- AF selection rectangle overlay -->
    <div id="af-rect" style="display:none;position:absolute;border:2px solid #e94560;background:rgba(233,69,96,.15);pointer-events:none;z-index:15;"></div>
  </div>
</div>

<!-- Camera Settings Dialog -->
<div class="modal-overlay" id="cam-dialog">
  <div class="modal">
    <h2>Camera Parameters</h2>
    <div id="cam-params-content"></div>
    <div class="modal-actions">
      <button onclick="document.getElementById('fcam').click()">Load Camera JSON</button>
      <button onclick="closeCamDialog()">Close</button>
    </div>
  </div>
</div>
<!-- Help Dialog — content is assembled at open time from each module's
     HELP export via dynamic import() (src/help-registry.js) -->
<div class="modal-overlay" id="help-dialog">
  <div class="modal" style="user-select:text;max-width:680px">
    <h2>How to Use VectorScope</h2>
    <div id="help-content"><p style="color:#888">Loading&hellip;</p></div>
    <div class="modal-actions">
      <button onclick="document.getElementById('help-dialog').classList.remove('open')">Close</button>
    </div>
  </div>
</div>

<div id="hmat"></div>
<div id="status">Loading&hellip;</div>

<script>

    var c = document.createElement('canvas');
    var gl = c.getContext('webgl2') || c.getContext('webgl') || c.getContext('experimental-webgl');
    if (!gl) {

        msg.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);' +

            'font-family:system-ui,sans-serif;user-select:text;';   // body disables selection; re-enable so the chrome:// URLs are copyable
        msg.innerHTML = '<div style="max-width:560px;padding:32px;background:#16213e;border:1px solid #e94560;border-radius:12px;">' +
            '<h2 style="color:#e94560;margin:0 0 16px;">WebGL Not Available</h2>' +
            '<p style="line-height:1.7;margin:0 0 16px;">VectorScope requires WebGL, which is currently disabled or unavailable in your browser.</p>' +
            '<h3 style="color:#4fc3f7;margin:0 0 8px;">How to fix (Chrome):</h3>' +
            '<ol style="line-height:2;margin:0 0 16px;padding-left:20px;">' +

            '<li>Restart Chrome</li></ol>' +
            '<h3 style="color:#4fc3f7;margin:0 0 8px;">Still not working?</h3>' +
            '<ol style="line-height:2;margin:0;padding-left:20px;">' +
            '<li>Go to <code style="background:#0a0f1e;padding:2px 6px;border-radius:3px;">chrome://flags/#use-angle</code> &rarr; set to <b>OpenGL</b></li>' +
            '<li>Go to <code style="background:#0a0f1e;padding:2px 6px;border-radius:3px;">chrome://flags/#enable-webgl</code> &rarr; set to <b>Enabled</b></li>' +
            '<li>Restart Chrome</li></ol></div>';
        document.body.appendChild(msg);
        throw new Error('WebGL not available');
    }
})();
</script>

<script type="module">
/* ── Error Handlers ── */
window.addEventListener('error', e => {
    const el = document.getElementById('status');
    if (el) el.textContent = `ERR: ${e.message} @ ${e.filename}:${e.lineno}`;
});
window.addEventListener('unhandledrejection', e => {
    const el = document.getElementById('status');
    if (el) el.textContent = `ERR: ${e.reason}`;
});

/* ── Module Imports ── */

import { GLTFLoader } from './lib/GLTFLoader.js?v=30';
import { DRACOLoader } from './lib/DRACOLoader.js?v=30';
import { SCENE_CAM, DEF_CAM } from './src/camera.js';
import { SRC } from './src/zoom-pipeline.js';

import { createAssetRegistry } from './src/asset-registry.js';
import { createObjectOps } from './src/object-ops.js';
import { createAssetParser } from './src/asset-parse.js';
import { createSceneIO } from './src/scene-io.js';

import { createSceneManager } from './src/scene-manager.js';

import { createTransport } from './src/transport.js';
import { createRecorder } from './src/recorder.js';

/* ── Helpers ── */
const $ = id => document.getElementById(id);
/* Late-bound render-loop dirty hook (assigned in the RENDER LOOP section).
   `log` doubles as an async-change signal: model loads, adds, scene loads
   all log on completion — marking dirty here catches them all. */
let onSceneChanged = () => {};
function log(msg) { $('status').textContent = msg; console.log('[VS]', msg); onSceneChanged(); }
log('Three.js loaded');

/* ================================================================
   STATE
   - `store` (src/config-store.js) is the single source of truth for all
     persistable state; sections: 'controls' (ui-controls.js), 'cameras'
     (registered below, after panels exist).
   - `S` holds runtime/transient state; its persistable fields are written
     ONLY by store apply hooks (unidirectional data flow).
   ================================================================ */
const store = createConfigStore();
const S = {
    warp: false, zoom: 1.0, prewarpScale: 1.0, prewarpScale2: 1.0, depthD: 3.0,
    clipY: 2.0,            // BEV clipping plane height
    blendX: 20,            // camera-transition blend length in frames (0 = off)
    blendMode: 'single',   // 'single' = frozen last frame | 'dual' = live follower RT
    sampleSrc: SRC.MAIN, sampleM: null,   // current frame's sampling state (set by refreshH)
    followerSrc: null, followerM: null,   // live follower state for dual-mode blends (set by refreshH)
    sel: null, selCam: null, // selected object / selected camera name
    dragging: false,
    dragPlane: new THREE.Plane(), dragOff: new THREE.Vector3(),
    objs: [], origPos: new Map(), camParams: null,
};

/* ================================================================
   RENDERER + GL CONTEXT (src/gl-bootstrap.js)
   ================================================================ */
const RT_W = 1080, RT_H = 1920;   // portrait 9:16, matches camera windows
const canvas = $('main-canvas');
const gl = createGlContext({ THREE, canvas, rtW: RT_W, rtH: RT_H, log });
const { renderer, scene, aLight, dLight, rtDepth, depthMat, matWarp } = gl;

/* ================================================================
   CAMERAS
   - R.main, R.sec1, R.sec2: PerspectiveCamera (from intrinsics)
   - R.bev: OrthographicCamera looking straight down for Bird's Eye
   - Camera markers: colored indicators on layer 1 (BEV-only)
   ================================================================ */

/* BEV Ghost Mode (src/bev-ghost.js): objects above S.clipY render
   semi-transparent in the BEV pass instead of blocking the view. */
const bevGhost = createBevGhost({ THREE, scene, getClipY: () => S.clipY });

/* Camera rig (src/camera-rig.js): main/sec1/sec2 + BEV camera + markers.
   R is a live object — init() reassigns its fields; always access by
   property (R.main), never destructure. */
const camRig = createCameraRig({ THREE, scene, SCENE_CAM, bevSize: 6 });
const R = camRig.rig;

/* Trajectory transport (src/transport.js): Play/Pause/Stop/Seek/Step state
   machine + the master clock. onChange is late-bound — the real handler is
   assigned in the TRAJECTORY TRANSPORT UI section (needs markDirty etc.). */
let onTransportChange = () => {};
let onPostFrame = () => {};
const transport = createTransport({ onChange: (ev) => onTransportChange(ev) });

/* Scene animation (src/scene-anim.js): procedural presets assigned per
   object from the Selection panel. `depth` mode moves along the main
   camera's optical axis — snapshotted at assignment time.
   Declared before SCENE LOADING (doLoadScene calls clearAll).
   Clock = the transport's master clock: wall time in free mode, exact frame
   time while a trajectory is engaged — so pause/step/seek reposition
   animated objects deterministically (boss rule #6). */
const sceneAnim = createSceneAnimator({ now: () => transport.timeMs() });
function initCams(p) { camRig.init(p); S.camParams = p; }
initCams(DEF_CAM);

/* Camera-transition blending (src/blend.js): after a source switch the
   Combined view cross-fades from the outgoing camera's frozen last frame
   to the live incoming camera over S.blendX frames. The outgoing RT is
   not re-rendered during the blend, so it holds its last frame for free. */
const blendCtl = createBlendController({ getX: () => S.blendX });

/* Sampling refresh (src/sampling-hud.js): pushes the zoom pipeline's pure
   math into shader uniforms, blend inputs, follower state and the HUD. */
const refreshH = createSamplingRefresh({
    S, R, matWarp, rtW: RT_W, rtH: RT_H,
    onHud: (html) => { $('hmat').innerHTML = html; },
    /* Play mode: lead/follower come from the trajectory frame, not the
       zoom rules (boss rule #2). Free mode: null → rules apply. */
    getOverride: () => {
        const rec = transport.current();
        return rec ? {
            leadSrc: CAM_TO_SRC[rec.lead],
            followerSrc: CAM_TO_SRC[rec.follower],
            label: `TRAJ f${transport.getFrame()} ${rec.lead}\u2192${rec.follower}`,
        } : null;
    },
});

/* ================================================================
   SCENE LOADING (src/scene-manager.js + src/fallback-scene.js)
   ================================================================ */
initLoader({ scene, GLTFLoader, DRACOLoader, dracoPath: './lib/draco/', ambientLight: aLight, directionalLight: dLight });

const fallback = createFallbackScene({
    THREE, scene, getLoaderState,
    onRemove: (o) => { sceneAnim.clear(o); if (S.sel === o) sel(null); },
});
const { doLoadScene, armFallbackTimer, syncObjs } = createSceneManager({
    S, sceneAnim, loadScene, getLoaderState, fallback, log,
});
doLoadScene('assets/bedroom.glb', true);
armFallbackTimer(5000);

/* Asset registry (src/asset-registry.js): raw asset sources for scene save.
   The default scene is url-sourced — its bytes are fetched at save time, so
   a save directory is always self-contained. */
const assetRegistry = createAssetRegistry();
assetRegistry.setSceneAsset({ name: 'bedroom.glb', format: 'glb', url: 'assets/bedroom.glb' });

/* ================================================================
   PANELS
   ================================================================ */
const { P, layoutPanels, getPanel, toNDC, setMode, getMode } = createPanelManager({
    $, RT_W, RT_H,
    onCameraAspect: (aspect) => {
        for (const c of [R.main, R.sec1, R.sec2]) {
            if (c) { c.aspect = aspect; c.updateProjectionMatrix(); }
        }
    },
});

/* ================================================================
   CAMERAS CONFIG SECTION
   Registered here (not in ui-controls) because the apply hook needs
   camRig/layoutPanels/P. All camera edits — dialog Apply, inline panel
   edits, camera JSON file — route through store.set('cameras', …).
   ================================================================ */
/* Group: PER-FRAME — camera intrinsics/extrinsics and rig pose are
   recorded every frame in the trajectory (they can change per-frame). */
store.register('cameras', {
    defaults: {
        camParams: DEF_CAM,
        sceneCam: { position: SCENE_CAM.position, rotation_euler_deg: SCENE_CAM.rotation_euler_deg },
    },
    apply: (v) => {
        SCENE_CAM.position = v.sceneCam.position;
        SCENE_CAM.rotation_euler_deg = v.sceneCam.rotation_euler_deg;
        initCams(v.camParams);
        layoutPanels();
        camRig.updateBevAspect(P.bev);
        refreshH();
    },
});

/* ================================================================
   INTERACTION
   ================================================================ */

const { onSelChange } = initSelectionPanel({
    THREE, S, SCENE_CAM,
    getMainCam: () => R.main, getSecCam: () => R.sec1, getSecCam2: () => R.sec2,
    onCamEdit: () => { store.set('cameras', { camParams: S.camParams }); },
    getAnim: (o) => sceneAnim.get(o),
    onAnimSet: (o, mode, speed) => {
        const d = new THREE.Vector3(0, 0, -1).applyQuaternion(R.main.quaternion);
        sceneAnim.setAnim(o, mode, { speed, dir: [d.x, d.y, d.z] });
    },
    $,
});

const { sel, syncDepthSlider } = initInteraction({
    THREE, canvas, scene, S, P,
    getMainCam: () => R.main, getSecCam: () => R.sec1, getSecCam2: () => R.sec2,
    getBevCam: () => R.bev,
    getCamMarkers: () => R.markerMap,
    onSelChange,
    getPanel, toNDC, $,
});

/* ================================================================
   OBJECT OPS + SCENE SAVE/LOAD
   (src/object-ops.js + src/asset-parse.js + src/scene-io.js)
   ================================================================ */
const objectOps = createObjectOps({
    THREE, S, getLoaderState,
    getMainCam: () => R.main, getFocusD: () => S.depthD,
    sceneAnim, sel, log,
});
const assetParser = createAssetParser({
    THREE, GLTFLoader, DRACOLoader, dracoPath: './lib/draco/', OBJLoader, MTLLoader,
});
/* Trajectory library object — standard serialize/restore interface.
   The actual Map and UI sync are defined later in the TRAJECTORY section;
   scene-io uses only serialize()/restore() which are late-bound here. */
const trajLibraryIO = { serialize: () => [], restore: () => {} };

const sceneIO = createSceneIO({
    store, assetRegistry, objectOps, assetParser,
    loader: { clearModels, registerModel }, scene,
    trajLibrary: trajLibraryIO,
    onBeforeReplace: () => { sceneAnim.clearAll(); sel(null); },
    onAfterLoad: () => { syncObjs(); },
    log,
});

/* Add: parse picked files (.glb | .obj+.mtl+textures) entirely in memory,
   register as one selectable object, place at Focus D in front of R.main. */
$('fadd').onchange = async function () {
    if (!this.files.length) return;
    const picked = [...this.files];
    this.value = '';
    try {
        const files = [];
        for (const f of picked) files.push({ name: f.name, data: await f.arrayBuffer() });
        const { root, format, mainName } = await assetParser.parseFiles(files);
        const assetId = assetRegistry.add({ name: mainName, format, files });
        const objs = registerModel(root, { children: false });
        objectOps.adoptObjects(objs, { assetId, place: true });
        syncObjs();
        log(`Added: ${mainName}`);
    } catch (e) { log(`Add failed: ${e.message}`); console.error(e); }
};
$('btn-del').onclick = () => {
    if (!objectOps.deleteSelected()) log('Delete: no object selected');
};
$('btn-save-scene').onclick = () =>
    sceneIO.saveScene().catch(e => { log(`Save failed: ${e.message}`); console.error(e); });
$('btn-load-scene').onclick = () =>
    sceneIO.loadScene().catch(e => { log(`Load failed: ${e.message}`); console.error(e); });
if (!sceneIO.isSupported()) {
    $('btn-save-scene').disabled = $('btn-load-scene').disabled = true;
    $('btn-save-scene').title = $('btn-load-scene').title =
        'Requires the File System Access API (Chrome/Edge)';
}

/* ================================================================
   AUTOFOCUS
   ================================================================ */
initAutofocus({
    $, canvas, renderer, scene, depthMat, rtDepth, P, RT_W, RT_H,
    getMainCam: () => R.main,
    onFocus: (focusD) => {
        if (!isFinite(focusD)) {
            /* No object in the AF region: show "inf", keep Focus D unchanged. */
            $('vd').textContent = 'inf';
            log('AF: no object in region — distance inf');
            return;
        }
        store.set('controls', { depthD: focusD });
    },
});

/* ================================================================
   UI CONTROLS (src/ui-controls.js) — registers the 'controls' section
   and performs the initial store → S/DOM render.
   ================================================================ */
const ui = initUiControls({
    $, store, S, THREE, R, log, refreshH, blendCtl, matWarp, sceneAnim,
    resetPositions, sel, SCENE_CAM,
    restoreHidden: objectOps.restoreHidden,
});
window.nudge = ui.nudge;
window.openCamDialog = ui.openCamDialog;
window.closeCamDialog = ui.closeCamDialog;

/* ================================================================
   COMBINED FOCUS MODE + HELP
   View mode is a persisted store section — scene save/load restores it.
   ================================================================ */
/* Group: SESSION — view layout is scene-level, NOT recorded per-frame. */
store.register('view', {
    defaults: { mode: 'full' },           // 'full' | 'combined'
    apply: (v) => {
        setMode(v.mode);                  // re-layouts panels + DOM decorations
        camRig.updateBevAspect(P.bev);    // no-op when BEV is collapsed
        $('btn-combined').classList.toggle('active', v.mode === 'combined');
    },
});
$('btn-combined').onclick = () => {
    const next = getMode() === 'combined' ? 'full' : 'combined';
    store.set('view', { mode: next });
    log(next === 'combined' ? 'Combined focus mode' : 'Full layout');
};
/* Help content is distributed: each module exports a HELP section next to
   the code it documents. Collected lazily on first open via dynamic
   import() and rendered by src/help-registry.js. */
const HELP_MODULES = [
    './src/panels.js', './src/interaction.js', './src/zoom-pipeline.js',
    './src/ui-controls.js', './src/autofocus.js', './src/object-ops.js',
    './src/scene-io.js', './src/scene-anim.js', './src/bev-ghost.js',
    './src/trajectory.js',
];
let helpBuilt = false;
async function buildHelp() {
    const { createHelpRegistry } = await import('./src/help-registry.js');
    const reg = createHelpRegistry();
    reg.register('app', {
        title: 'What is this?',
        order: 0,
        text: 'VectorScope simulates a phone-style multi-camera rig (UW 0.5x / Main 1x / Tele 5x) '
            + 'and shows how the <b>Combined</b> view hands over between cameras during continuous '
            + 'zoom using plane-induced homographies at focus depth D.',
    });
    for (const path of HELP_MODULES) {
        try {
            const m = await import(path);
            if (m.HELP) reg.register(path, m.HELP);
        } catch (e) { console.warn('help: failed to load', path, e); }
    }
    $('help-content').innerHTML = reg.render();
    helpBuilt = true;
}
$('btn-help').onclick = () => {
    if (!helpBuilt) buildHelp().catch(e => log(`Help failed: ${e.message}`));
    $('help-dialog').classList.add('open');
};
$('help-dialog').addEventListener('click', (e) => {
    if (e.target === $('help-dialog')) $('help-dialog').classList.remove('open');
});
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') $('help-dialog').classList.remove('open');
});

/* ================================================================
   HOMOGRAPHY HUD + DEBUG HOOKS
   ================================================================ */
window.refreshH = refreshH;
refreshH();

// Debug/test hook (headless regression scripts inspect blend state)
window.VS_DEBUG = { matWarp, blendCtl, sceneAnim, S, store, objectOps, assetRegistry, assetParser, sceneIO, syncObjs, registerModel, R, P, setMode, getMode };

/* ================================================================
   RESIZE + RENDER LOOP (src/render-loop.js)
   ================================================================ */
function onResize() {
    const r = $('viewport-container').getBoundingClientRect();
    renderer.setSize(r.width, r.height);
    layoutPanels();
    camRig.updateBevAspect(P.bev);
}
window.addEventListener('resize', onResize);
onResize();

/* Debug overrides via URL params: ?fps=0 disables the fixed 30fps pacing
   (render on every rAF tick), ?fps=N sets another rate; ?keepalive=N
   changes the idle heartbeat period. */
const urlP = new URLSearchParams(location.search);

/* Apply one trajectory frame record to the live state — called by the
   render loop before anything renders, whenever a trajectory is engaged.
   Writes S + DOM displays DIRECTLY (store bypassed): trajectory state is
   transient playback state, not user config — on Stop the store re-applies
   and everything snaps back to the persisted free-mode values. */
function applyTrajFrame(rec) {
    S.zoom = rec.zoom;
    S.depthD = rec.focusD;
    $('vz').textContent = rec.zoom.toFixed(2) + 'x';
    $('sld-z').value = Math.log10(rec.zoom);
    $('vd').textContent = rec.focusD.toFixed(1);
    $('sld-d').value = rec.focusD;
    /* Extended fields (recorded trajectories): prewarp, warp, blend params */
    if (rec.prewarp1 != null) { S.prewarpScale = rec.prewarp1; $('sld-pw').value = rec.prewarp1; $('vpw').textContent = rec.prewarp1.toFixed(2) + 'x'; }
    if (rec.prewarp2 != null) { S.prewarpScale2 = rec.prewarp2; $('sld-pw2').value = rec.prewarp2; $('vpw2').textContent = rec.prewarp2.toFixed(2) + 'x'; }
    if (rec.warp != null) S.warp = rec.warp;
    if (rec.blendX != null) { S.blendX = rec.blendX; $('sld-blend').value = rec.blendX; $('vblend').textContent = rec.blendX + 'f'; }
    if (rec.blendMode != null) S.blendMode = rec.blendMode;
    if (rec.camParams) S.camParams = rec.camParams;
    /* Fast pose path — no camera/marker rebuild (camRig.applyPose) */
    camRig.applyPose(rec.camParams || S.camParams, rec.sceneCam);
    refreshH();
}

const loop = createRenderLoop({
    renderer, scene, gl, R, S, P, camRig, bevGhost, sceneAnim, blendCtl,
    rtW: RT_W, rtH: RT_H,
    transport, onTrajFrame: applyTrajFrame,
    onPostFrame: () => onPostFrame(),
    ...(urlP.has('fps') ? { fps: Number(urlP.get('fps')) } : {}),
    ...(urlP.has('keepalive') ? { keepAlive: Number(urlP.get('keepalive')) } : {}),
});

/* Idle-skip dirty triggers: any one-shot change requests a few rendered
   frames (continuous motion — animations, blending, dragging — is detected
   inside the loop itself). Uninstrumented sources are caught by the loop's
   keep-alive heartbeat. */
const markDirty = () => loop.markDirty();
onSceneChanged = markDirty;                                // async loads via log()
for (const name of store.names()) store.subscribe(name, markDirty);  // all config writes
document.addEventListener('input', markDirty, true);       // sliders, dialog edits
document.addEventListener('click', markDirty, true);       // buttons
canvas.addEventListener('pointerdown', markDirty, true);   // selection highlight
canvas.addEventListener('pointerup', markDirty, true);
window.addEventListener('resize', markDirty);
VS_DEBUG.markDirty = markDirty;
VS_DEBUG.loop = loop;

/* 30/60 FPS toggle — fixed CPU-clock rate; a frame that can't be produced
   in time is dropped (the loop stamps the actual render time, so it never
   queues catch-up frames). Persisted as the 'render' store section.
   Note: a ?fps= URL override bypasses the store until the next toggle/load. */
function syncFpsBtn() {
    const f = loop.getFps();
    $('btn-fps').textContent = f > 0 ? `${f} FPS` : 'VSYNC';
}
/* Group: SESSION — render fps is scene-level. For trajectories, fps is
   stored once as trajectory-level metadata (not per-frame). */
store.register('render', {
    defaults: { fps: 30 },
    apply: (v) => { loop.setFps(v.fps); syncFpsBtn(); },
});
store.subscribe('render', markDirty);   // registered after the bulk subscribe loop above
$('btn-fps').onclick = () => {
    store.set('render', { fps: loop.getFps() === 30 ? 60 : 30 });
    log(`Render rate: ${loop.getFps()} fps (late frames dropped)`);
};
syncFpsBtn();

/* ================================================================
   TRAJECTORY TRANSPORT UI (src/trajectory.js + src/transport.js)
   Play mode: the trajectory drives lead/follower/zoom/focusD/rig pose/
   blend per frame; the built-in zoom rules apply only in free mode.
   While engaged, scene controls are locked — objects stay operable
   (boss rule #5); animations run on the frame clock (boss rule #6).
   ================================================================ */

/* Controls locked while a trajectory is engaged OR recording. */
const TRAJ_LOCK_IDS = [
    'sld-d', 'sld-pw', 'sld-pw2', 'sld-z', 'sld-blend', 'sld-clip',
    'btn-af', 'btn-warp', 'btn-play', 'btn-bmode', 'btn-reset', 'btn-setcam',
    'btn-save-scene', 'btn-load-scene', 'btn-fps', 'btn-combined',
];
function lockControls(locked) {
    for (const id of TRAJ_LOCK_IDS) { const el = $(id); if (el) el.disabled = locked; }
    for (const b of document.querySelectorAll('#zoom-presets .zp-btn')) b.disabled = locked;
    for (const id of ['sld-d', 'sld-pw', 'sld-pw2', 'sld-z', 'sld-blend']) {
        const s = $(id);
        if (s) for (const b of s.parentElement.querySelectorAll('.sld-btn')) b.disabled = locked;
    }
}

/* ── Trajectory List ── */
const trajLibrary = new Map();   // name → parsed trajectory object

function addToLibrary(traj) {
    trajLibrary.set(traj.name, traj);
    syncTrajList();
}

/** Delta-encode a parsed trajectory back to compact JSON for storage. */
function trajToJson(traj) {
    const dense = [];
    for (let i = 0; i < traj.length; i++) dense.push(traj.frameAt(i));
    const frames = [];
    for (let i = 0; i < dense.length; i++) {
        if (i === 0) { frames.push(dense[i]); continue; }
        const delta = {};
        for (const [k, v] of Object.entries(dense[i])) {
            if (k === 'blendT') continue;
            if (JSON.stringify(v) !== JSON.stringify(dense[i - 1][k])) delta[k] = v;
        }
        frames.push(Object.keys(delta).length > 0 ? delta : { zoom: dense[i].zoom });
    }
    return { version: 1, name: traj.name, fps: traj.fps, frames };
}

/* Standard serialize/restore interface — used by scene-io directly. */
trajLibraryIO.serialize = () => {
    const out = [];
    for (const [name, traj] of trajLibrary) {
        out.push({ name, json: trajToJson(traj) });
    }
    return out;
};
trajLibraryIO.restore = (jsons) => {
    trajLibrary.clear();
    for (const j of jsons) {
        try { trajLibrary.set(parseTrajectory(j).name, parseTrajectory(j)); }
        catch (e) { console.warn('Skipped trajectory:', e.message); }
    }
    syncTrajList();
    transport.eject();
};

function syncTrajList() {
    const sel = $('sel-traj');
    const cur = sel.value;
    sel.innerHTML = '<option value="__default__">default</option>';
    for (const name of trajLibrary.keys()) {
        const opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        sel.appendChild(opt);
    }
    // Restore selection if still valid
    if (cur !== '__default__' && trajLibrary.has(cur)) sel.value = cur;
}

$('sel-traj').onchange = function () {
    if (this.value === '__default__') {
        transport.stop();
        log('Trajectory: free mode (default)');
    } else {
        const traj = trajLibrary.get(this.value);
        if (traj) {
            transport.load(traj);
            log(`Trajectory: ${traj.name} \u2014 ${traj.length}f @ ${traj.fps}fps (\u25B6 to play)`);
        }
    }
};

/* ── Load Folder (multiple trajectories) ── */
/* Load: pick a single trajectory .json file */
$('btn-traj-load').onclick = () => $('ftraj').click();
$('ftraj').onchange = async function () {
    if (!this.files.length) return;
    const f = this.files[0];
    this.value = '';
    try {
        const traj = parseTrajectory(JSON.parse(await f.text()));
        addToLibrary(traj);
        $('sel-traj').value = traj.name;
        transport.load(traj);
        log(`Loaded: ${traj.name} \u2014 ${traj.length}f @ ${traj.fps}fps`);
    } catch (e) { log(`Load failed: ${e.message}`); console.error(e); }
};

/* ── Save trajectory to disk ── */
$('btn-traj-save').onclick = async () => {
    const name = $('sel-traj').value;
    if (name === '__default__' || !trajLibrary.has(name)) {
        log('Select a trajectory to save');
        return;
    }
    const traj = trajLibrary.get(name);
    const json = trajToJson(traj);
    const blob = new Blob([JSON.stringify(json, null, 2)], { type: 'application/json' });

    try {
        if (window.showSaveFilePicker) {
            const handle = await window.showSaveFilePicker({
                suggestedName: `${traj.name}.json`,
                types: [{ description: 'Trajectory JSON', accept: { 'application/json': ['.json'] } }],
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            log(`Saved: ${traj.name}.json`);
        } else {
            // Fallback: trigger download
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${traj.name}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
            log(`Downloaded: ${traj.name}.json`);
        }
    } catch (e) {
        if (e.name !== 'AbortError') { log(`Save failed: ${e.message}`); console.error(e); }
    }
};

/* ── Recorder ── */
const recorder = createRecorder({
    getState: () => ({
        zoom: S.zoom, depthD: S.depthD,
        prewarpScale: S.prewarpScale, prewarpScale2: S.prewarpScale2,
        warp: S.warp, blendX: S.blendX, blendMode: S.blendMode,
        sampleSrc: S.sampleSrc, sampleM: S.sampleM,
        followerSrc: S.followerSrc, followerM: S.followerM,
        camParams: S.camParams, isBlending: blendCtl.isBlending(),
    }),
    getSceneCam: () => SCENE_CAM,
    getFps: () => loop.getFps(),
});

onPostFrame = () => recorder.capture();

$('btn-traj-rec').onclick = () => {
    if (recorder.isRecording()) {
        // Stop recording → produce trajectory → add to library
        const traj = recorder.stop();
        $('btn-traj-rec').classList.remove('active');
        if (traj && traj.frames.length > 0) {
            const parsed = parseTrajectory(traj);
            addToLibrary(parsed);
            $('sel-traj').value = parsed.name;
            transport.load(parsed);
            log(`Recorded: ${parsed.name} \u2014 ${parsed.length}f @ ${parsed.fps}fps`);
        } else {
            log('Recording empty — discarded');
        }
    } else {
        // Cannot record while playing
        if (transport.isEngaged()) {
            log('Stop playback before recording');
            return;
        }
        recorder.start();
        $('btn-traj-rec').classList.add('active');
        syncTrajUI();
        log(`Recording @ ${loop.getFps()} fps \u2014 press Rec again to stop`);
    }
};

/* ── Transport controls ── */
function syncTrajUI() {
    const traj = transport.getTrajectory();
    const engaged = transport.isEngaged();
    const canPlay = !!traj && !recorder.isRecording();
    $('btn-traj-play').disabled = !canPlay;
    $('btn-traj-back').disabled = !canPlay;
    $('btn-traj-fwd').disabled = !canPlay;
    $('btn-traj-stop').disabled = !engaged;
    $('sld-traj').disabled = !canPlay;
    if (traj) {
        $('sld-traj').max = traj.length - 1;
        $('sld-traj').value = transport.getFrame();
        $('vtraj').textContent = `${transport.getFrame()}/${traj.length - 1}`;
    } else {
        $('sld-traj').max = 0; $('sld-traj').value = 0;
        $('vtraj').textContent = '\u2013/\u2013';
    }
    $('btn-traj-play').innerHTML = transport.isPlaying() ? '&#10074;&#10074;' : '&#9654;';
}

let trajWasEngaged = false;
onTransportChange = (ev) => {
    const engaged = transport.isEngaged();
    if (engaged !== trajWasEngaged) {
        sceneAnim.resyncClock();
        trajWasEngaged = engaged;
        lockControls(engaged);
    }
    if (ev === 'stop') {
        blendCtl.reset();
        store.set('cameras', {});
        store.set('controls', {});
    }
    syncTrajUI();
    markDirty();
};

$('btn-traj-play').onclick = () => transport.togglePlay();
$('btn-traj-stop').onclick = () => transport.stop();
$('btn-traj-back').onclick = () => transport.step(-1);
$('btn-traj-fwd').onclick = () => transport.step(1);
$('sld-traj').oninput = function () { transport.seek(+this.value); };

VS_DEBUG.transport = transport;
VS_DEBUG.recorder = recorder;
VS_DEBUG.trajLibrary = trajLibrary;
VS_DEBUG.parseTrajectory = parseTrajectory;

loop.start();

</script>
</body>
</html>
