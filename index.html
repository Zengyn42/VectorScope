<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VectorScope — Stereo Camera Homography Visualizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e; color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; height: 100vh; user-select: none;
}
#app { display: flex; flex-direction: column; height: 100vh; }
#controls-top {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 12px; background: #16213e;
    border-bottom: 1px solid #0f3460; flex-shrink: 0; flex-wrap: wrap;
}
.cg { display: flex; align-items: center; gap: 3px; }
label { font-size: 12px; color: #aaa; }
button {
    padding: 3px 10px; background: #0f3460; color: #e0e0e0;
    border: 1px solid #533483; border-radius: 4px; cursor: pointer;
    font-size: 12px; transition: background .15s;
}
button:hover { background: #533483; }
button.active { background: #e94560; border-color: #e94560; }
.sld-btn {
    padding: 1px 6px; font-size: 14px; line-height: 1;
    background: #0f3460; border: 1px solid #533483; border-radius: 3px;
    color: #e0e0e0; cursor: pointer; font-weight: bold;
}
.sld-btn:hover { background: #533483; }
input[type="range"] { width: 110px; accent-color: #e94560; }
input[type="file"] { display: none; }
.val {
    min-width: 44px; text-align: right; font-size: 12px;
    color: #e94560; font-family: monospace;
}
.sep { width: 1px; height: 22px; background: #0f3460; }
#viewport-container { flex: 1; position: relative; overflow: hidden; }
#main-canvas { display: block; width: 100%; height: 100%; }
.plbl {
    position: absolute; padding: 3px 10px;
    background: rgba(15,52,96,.85); border-radius: 3px;
    font-size: 11px; pointer-events: none; z-index: 10; white-space: nowrap;
}
.panel-sep-v {
    position: absolute; top: 0; width: 2px;
    background: #e94560; pointer-events: none; z-index: 5; opacity: 0.7;
}
.panel-sep-h {
    position: absolute; left: 0; width: 100%; height: 2px;
    background: #e94560; pointer-events: none; z-index: 5; opacity: 0.7;
}
#controls-bottom {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 12px; background: #16213e;
    border-top: 1px solid #0f3460; flex-shrink: 0; flex-wrap: wrap;
}
#selinfo { font-size: 12px; color: #aaa; min-width: 140px; }
#status {
    position: fixed; bottom: 40px; right: 16px;
    padding: 4px 10px; background: rgba(15,52,96,.9);
    border-radius: 4px; font-size: 11px; color: #888;
    pointer-events: none; z-index: 20;
}
#hmat {
    position: fixed; top: 50px; right: 16px;
    padding: 8px 12px; background: rgba(15,52,96,.92);
    border: 1px solid #533483; border-radius: 6px;
    font-family: monospace; font-size: 12px; color: #e0e0e0;
    pointer-events: none; z-index: 20; white-space: pre; line-height: 1.6;
}
/* ── Camera Settings Dialog ── */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,.6); z-index: 100; justify-content: center; align-items: center;
}
.modal-overlay.open { display: flex; }
.modal {
    background: #16213e; border: 1px solid #533483; border-radius: 8px;
    padding: 20px; min-width: 520px; max-width: 90vw; max-height: 85vh;
    overflow-y: auto; color: #e0e0e0; font-size: 13px;
}
.modal h2 { margin: 0 0 14px; font-size: 16px; color: #e94560; }
.modal h3 { margin: 12px 0 6px; font-size: 13px; color: #4fc3f7; border-bottom: 1px solid #0f3460; padding-bottom: 4px; }
.modal table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
.modal td { padding: 3px 8px; font-family: monospace; font-size: 12px; }
.modal td:first-child { color: #aaa; width: 140px; }
.modal td:last-child { color: #e0e0e0; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
.modal-actions button { padding: 6px 16px; }
.modal input[type="number"] {
    width: 80px; padding: 2px 6px; background: #0a0f1e; color: #e0e0e0;
    border: 1px solid #533483; border-radius: 3px; font-family: monospace;
    font-size: 12px; text-align: right;
}
.modal input[type="number"]:focus { outline: none; border-color: #e94560; }
.cam-field { display: inline-flex; align-items: center; gap: 4px; }
.cam-field label { color: #888; font-size: 11px; min-width: 14px; }
</style>
</head>
<body>
<div id="app">
  <div id="controls-top">
    <button onclick="document.getElementById('fscene').click()">Load Scene</button>
    <input type="file" id="fscene" accept=".glb,.gltf">
    <button id="btn-setcam" onclick="openCamDialog()">Set Camera</button>
    <input type="file" id="fcam" accept=".json" style="display:none">
    <button id="btn-reset">Reset All</button>
    <div class="sep"></div>
    <div class="cg">
      <label>Focus D:</label>
      <button class="sld-btn" onclick="nudge('sld-d',-1)">−</button>
      <input type="range" id="sld-d" min="0.1" max="10" step="0.1" value="3">
      <button class="sld-btn" onclick="nudge('sld-d',1)">+</button>
      <span class="val" id="vd">3.0</span>
      <button id="btn-af" class="sld-btn" style="margin-left:4px;width:auto;padding:0 6px">AF</button>
    </div>
    <div class="sep"></div>
    <div class="cg">
      <label>Prewarp:</label>
      <button class="sld-btn" onclick="nudge('sld-pw',-1)">−</button>
      <input type="range" id="sld-pw" min="0.25" max="4.0" step="0.01" value="1.0">
      <button class="sld-btn" onclick="nudge('sld-pw',1)">+</button>
      <span class="val" id="vpw">1.00x</span>
    </div>
    <div class="sep"></div>
    <div class="cg">
      <label>Zoom:</label>
      <button class="sld-btn" onclick="nudge('sld-z',-1)">−</button>
      <input type="range" id="sld-z" min="0.5" max="2.0" step="0.01" value="1.0">
      <button class="sld-btn" onclick="nudge('sld-z',1)">+</button>
      <span class="val" id="vz">1.00x</span>
    </div>
    <button id="btn-warp">Warp</button>
    <button id="btn-play">&#9654; Play</button>
  </div>

  <div id="viewport-container">
    <canvas id="main-canvas"></canvas>
    <div class="plbl" id="lbl-m" style="color:#4fc3f7">&#9678; Main Camera</div>
    <div class="plbl" id="lbl-s" style="color:#81c784">&#9678; Secondary Camera</div>
    <div class="plbl" id="lbl-c" style="color:#e94560">&#9678; Combined — 1.00x</div>
    <div class="panel-sep-v" id="sep-v"></div>
    <div class="panel-sep-h" id="sep-h"></div>
    <div id="af-rect" style="display:none;position:absolute;border:2px solid #e94560;background:rgba(233,69,96,.15);pointer-events:none;z-index:15;"></div>
  </div>

  <div id="controls-bottom">
    <span id="selinfo">Click object in Main panel</span>
    <div class="sep"></div>
    <div class="cg">
      <label>Obj Depth:</label>
      <button class="sld-btn" onclick="nudge('sld-od',-1)">−</button>
      <input type="range" id="sld-od" min="-10" max="30" step="0.1" value="3" disabled>
      <button class="sld-btn" onclick="nudge('sld-od',1)">+</button>
      <span class="val" id="vod">—</span>
    </div>
  </div>
</div>
<div class="modal-overlay" id="cam-dialog">
  <div class="modal">
    <h2>Camera Parameters</h2>
    <div id="cam-params-content"></div>
    <div class="modal-actions">
      <button onclick="document.getElementById('fcam').click()">Load Camera JSON</button>
      <button onclick="closeCamDialog()">Close</button>
    </div>
  </div>
</div>
<div id="hmat"></div>
<div id="status">Loading…</div>

<script type="importmap">
{ "imports": { "three": "./lib/three.module.js?v=29" } }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from './lib/GLTFLoader.js?v=29';
import { DRACOLoader } from './lib/DRACOLoader.js?v=29';
import { M } from './src/math.js';
import { SCENE_CAM, DEF_CAM } from './src/camera.js';
import { eulerR, computeH, zoomMatrix } from './src/homography.js';
import { initLoader, loadScene, getLoaderState, resetPositions } from './src/loader.js';
import { renderCamDialog, readCamInputs, readSceneInputs, bindDialog } from './src/camera-dialog.js';

/* ── helpers ── */
const $ = id => document.getElementById(id);
function log(msg) { $('status').textContent = msg; console.log('[VS]', msg); }
log('Three.js loaded');

/* ── +/− nudge for sliders ── */
window.nudge = function(id, dir) {
    const s = $(id);
    if (s.disabled) return;
    const v = Math.min(parseFloat(s.max), Math.max(parseFloat(s.min), parseFloat(s.value) + dir * 0.1));
    s.value = v;
    s.dispatchEvent(new Event('input'));
};

/* ================================================================
   STATE
   ================================================================ */
const S = {
    warp: false, zoom: 1.0, prewarpScale: 1.0, depthD: 3.0,
    sel: null, dragging: false,
    dragPlane: new THREE.Plane(), dragOff: new THREE.Vector3(),
    objs: [],
    origPos: new Map(),
    camParams: null,
};

/* SCENE_CAM, DEF_CAM — imported from ./src/camera.js */

/* M, eulerR, computeH — imported from ./src/math.js and ./src/homography.js */

/* ================================================================
   SHADER
   ================================================================ */
const VS=`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;
const FS=`
uniform sampler2D tM,tS;
uniform mat3 uHi;
uniform float uZ;
uniform float uCrop;
uniform bool uW;
uniform vec2 uR;
varying vec2 vUv;
vec4 toSRGB(vec4 c){ return vec4(pow(c.rgb, vec3(1.0/2.2)), c.a); }
void main(){
    vec2 z=.5+(vUv-.5)/uCrop;
    vec4 col;
    if(uZ<=1.){
        if(uW){
            vec2 px=vec2(z.x*uR.x,(1.-z.y)*uR.y);
            vec3 sp=uHi*vec3(px,1.);
            vec2 s=vec2(sp.x/sp.z/uR.x,1.-sp.y/sp.z/uR.y);
            col=(s.x>=0.&&s.x<=1.&&s.y>=0.&&s.y<=1.)?texture2D(tS,s):vec4(.06,.06,.12,1.);
        }else{
            col=(z.x>=0.&&z.x<=1.&&z.y>=0.&&z.y<=1.)?texture2D(tS,z):vec4(.06,.06,.12,1.);
        }
    }else{
        col=(z.x>=0.&&z.x<=1.&&z.y>=0.&&z.y<=1.)?texture2D(tM,z):vec4(.06,.06,.12,1.);
    }
    gl_FragColor=toSRGB(col);
}`;

/* ================================================================
   RENDERER
   ================================================================ */
const canvas = $('main-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x1a1a2e);
renderer.autoClear = false;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a3e);

const aLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(aLight);
const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
dLight.position.set(5, 8, 5);
scene.add(dLight);

/* ── Cameras ── */
const RT_W = 1920, RT_H = 1080;
let mainCam, secCam;

function makeCamFromIntrinsics(intrinsics, imageSize) {
    const { fy } = intrinsics;
    const [w, h] = imageSize;
    const fov = 2 * Math.atan(h / (2 * fy)) * 180 / Math.PI;
    return new THREE.PerspectiveCamera(fov, 4/3, 0.01, 500);
}

function initCams(p) {
    if (mainCam) { scene.remove(mainCam); scene.remove(secCam); }
    S.camParams = p;

    // Main camera = scene camera (identity extrinsics → placed at SCENE_CAM)
    mainCam = makeCamFromIntrinsics(p.main_camera.intrinsics, p.main_camera.image_size);
    mainCam.position.set(...SCENE_CAM.position);
    const [rx, ry, rz] = SCENE_CAM.rotation_euler_deg.map(d => d * Math.PI / 180);
    mainCam.rotation.set(rx, ry, rz, 'ZYX');

    // Secondary camera = scene camera + relative offset from secondary extrinsics
    secCam = makeCamFromIntrinsics(p.secondary_camera.intrinsics, p.secondary_camera.image_size);
    // Apply relative position in main camera's local frame
    const relPos = new THREE.Vector3(...p.secondary_camera.extrinsics.position);
    const worldPos = relPos.applyQuaternion(mainCam.quaternion).add(mainCam.position);
    secCam.position.copy(worldPos);
    // Apply relative rotation on top of main camera rotation
    const relRot = p.secondary_camera.extrinsics.rotation_euler_deg.map(d => d * Math.PI / 180);
    const relQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(relRot[0], relRot[1], relRot[2], 'ZYX'));
    secCam.quaternion.copy(mainCam.quaternion).multiply(relQuat);

    scene.add(mainCam);
    scene.add(secCam);
}
initCams(DEF_CAM);

/* ── Render targets ── */
const rtM = new THREE.WebGLRenderTarget(RT_W, RT_H);
const rtS = new THREE.WebGLRenderTarget(RT_W, RT_H);
// Mark RT textures as linear so the sRGB output pass doesn't double-encode
rtM.texture.colorSpace = THREE.LinearSRGBColorSpace;
rtS.texture.colorSpace = THREE.LinearSRGBColorSpace;

/* ── Depth render target for autofocus ── */
const rtDepth = new THREE.WebGLRenderTarget(RT_W, RT_H);
const depthMat = new THREE.MeshDepthMaterial({
    depthPacking: THREE.RGBADepthPacking,
});

/* ── Display quad ── */
const dScene = new THREE.Scene();
const dCam = new THREE.OrthographicCamera(-0.5, 0.5, 0.5, -0.5, 0, 1);
const quad = new THREE.Mesh(new THREE.PlaneGeometry(1, 1));
dScene.add(quad);

const matWarp = new THREE.ShaderMaterial({
    vertexShader: VS, fragmentShader: FS,
    uniforms: {
        tM: { value: rtM.texture },
        tS: { value: rtS.texture },
        uHi: { value: new THREE.Matrix3() },
        uZ: { value: 1.0 },
        uCrop: { value: 1.0 },
        uW: { value: false },
        uR: { value: new THREE.Vector2(RT_W, RT_H) },
    },
});

/* ================================================================
   SCENE LOADING  (via src/loader.js)
   ================================================================ */
initLoader({
    scene,
    GLTFLoader, DRACOLoader,
    dracoPath: './lib/draco/',
    ambientLight: aLight,
    directionalLight: dLight,
});

function doLoadScene(url, isDefault = false) {
    log('Loading scene…');
    loadScene(url, {
        isDefault,
        onProgress: (loaded, total) => log(`Loading ${(loaded / total * 100) | 0}%…`),
        onComplete: (count) => {
            const ls = getLoaderState();
            S.objs = ls.objs;
            S.origPos = ls.origPos;
            log(`Loaded: ${count} objects`);
        },
        onError: (err) => {
            if (isDefault && !getLoaderState().loaded) { addFallback(); log('Fallback scene'); }
        },
    });
}

function addFallback() {
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(12, 12),
        new THREE.MeshStandardMaterial({ color: 0x3a3a5c })
    );
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);
    const ls = getLoaderState();
    [[0xe94560,[-1.2,.4,2],'Red Cube',new THREE.BoxGeometry(.8,.8,.8)],
     [0x533483,[1,.5,3.5],'Purple Sphere',new THREE.SphereGeometry(.5,32,32)],
     [0x0f3460,[0,.55,1],'Blue Torus',new THREE.TorusGeometry(.35,.12,16,48)],
     [0x16c79a,[2,.5,4],'Green Cone',new THREE.ConeGeometry(.35,1,32)],
     [0xf5a623,[-2,.5,3.5],'Orange Cyl',new THREE.CylinderGeometry(.25,.25,1,32)],
    ].forEach(([c,p,n,g])=>{
        const m=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:c,roughness:.3}));
        m.position.set(...p);m.name=n;scene.add(m);
        ls.objs.push(m);
        ls.origPos.set(m.uuid,m.position.clone());
    });
    S.objs = ls.objs;
    S.origPos = ls.origPos;
    ls.loaded = true;
}

doLoadScene('assets/bedroom.glb', true);
setTimeout(() => { if (!getLoaderState().loaded) { addFallback(); log('Fallback scene'); } }, 5000);

/* ================================================================
   PANELS — New Layout:
   Top row: Main (left) | Secondary (right) — each 50% width, ~40% height
   Bottom row: Combined (centered) — 100% width, ~60% height
   ================================================================ */
const GAP = 2;
const P = { m: {}, s: {}, c: {} };

function layoutPanels() {
    const r = $('viewport-container').getBoundingClientRect();
    const W = r.width, H = r.height;
    // Top row: 40% height, two panels side by side
    const topH = Math.floor(H * 0.4);
    const botH = H - topH - GAP;
    const halfW = Math.floor((W - GAP) / 2);

    P.m = { x: 0, y: botH + GAP, w: halfW, h: topH };          // top-left
    P.s = { x: halfW + GAP, y: botH + GAP, w: W - halfW - GAP, h: topH }; // top-right

    // Combined panel: must match RT aspect ratio (camera intrinsics space)
    const targetAspect = RT_W / RT_H;
    let cw = W, ch = botH;
    if (cw / ch > targetAspect) {
        cw = Math.floor(ch * targetAspect);
    } else {
        ch = Math.floor(cw / targetAspect);
    }
    const cx = Math.floor((W - cw) / 2);
    const cy = Math.floor((botH - ch) / 2);
    P.c = { x: cx, y: cy, w: cw, h: ch };                       // bottom centered

    // Labels (CSS top = distance from top of container)
    $('lbl-m').style.left = (P.m.x + 8) + 'px';
    $('lbl-m').style.top = (H - P.m.y - P.m.h + 6) + 'px';
    $('lbl-s').style.left = (P.s.x + 8) + 'px';
    $('lbl-s').style.top = (H - P.s.y - P.s.h + 6) + 'px';
    $('lbl-c').style.left = (P.c.x + 8) + 'px';
    $('lbl-c').style.top = (H - P.c.y - P.c.h + 6) + 'px';

    // Separators
    $('sep-v').style.left = halfW + 'px';
    $('sep-v').style.top = (H - P.m.y - P.m.h) + 'px';
    $('sep-v').style.height = topH + 'px';

    $('sep-h').style.top = (H - P.m.y - P.m.h - GAP) + 'px';

    // Camera aspect = panel aspect
    const mAspect = P.m.w / P.m.h;
    const cAspect = P.c.w / P.c.h;
    if (mainCam) { mainCam.aspect = mAspect; mainCam.updateProjectionMatrix(); }
    if (secCam)  { secCam.aspect = mAspect; secCam.updateProjectionMatrix(); }
}

/* ================================================================
   INTERACTION
   ================================================================ */
const rc = new THREE.Raycaster();
const hitPt = new THREE.Vector3();

function getPanel(cx, cy) {
    const r = canvas.getBoundingClientRect();
    const x = cx - r.left, y = cy - r.top;
    const H = r.height;
    // WebGL y=0 is bottom; CSS y=0 is top. Panel y values are in WebGL coords.
    // Convert CSS y to WebGL y for comparison
    const topRowCSSTop = H - P.m.y - P.m.h;
    if (y < topRowCSSTop) return 'c'; // bottom panel = combined (top in CSS because WebGL y is flipped)
    if (x < P.m.w) return 'm';
    return 's';
}

function toNDC(cx, cy, p) {
    const r = canvas.getBoundingClientRect();
    const H = r.height;
    // Convert panel's WebGL coords to CSS coords for NDC calculation
    const panelCSSTop = H - p.y - p.h;
    return new THREE.Vector2(
        ((cx - r.left - p.x) / p.w) * 2 - 1,
        -((cy - r.top - panelCSSTop) / p.h) * 2 + 1
    );
}

function sel(obj) {
    if (S.sel) {
        try {
            S.sel.traverse(ch => {
                if (ch.isMesh && ch.userData._oe !== undefined) {
                    const mats = Array.isArray(ch.material) ? ch.material : [ch.material];
                    mats.forEach(m => { if (m && m.emissive) m.emissive.setHex(ch.userData._oe); });
                    delete ch.userData._oe;
                }
            });
        } catch (e) { console.warn('deselect error:', e); }
    }
    S.sel = obj;
    if (obj) {
        try {
            obj.traverse(ch => {
                if (ch.isMesh) {
                    const mats = Array.isArray(ch.material) ? ch.material : [ch.material];
                    mats.forEach(m => {
                        if (m && m.emissive) {
                            ch.userData._oe = m.emissive.getHex();
                            m.emissive.setHex(0x555555);
                        }
                    });
                }
            });
        } catch (e) { console.warn('select error:', e); }
        $('selinfo').textContent = `Selected: ${obj.name}`;
        $('sld-od').disabled = false;
        syncDepthSlider();
    } else {
        $('selinfo').textContent = 'Click object in Main panel';
        $('sld-od').disabled = true;
        $('vod').textContent = '—';
    }
}

function syncDepthSlider() {
    if (!S.sel) return;
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(mainCam.quaternion);
    const c = new THREE.Vector3();
    new THREE.Box3().setFromObject(S.sel).getCenter(c);
    const d = c.sub(mainCam.position).dot(dir);
    $('sld-od').value = d;
    $('vod').textContent = d.toFixed(1);
}

canvas.addEventListener('pointerdown', e => {
    const panel = getPanel(e.clientX, e.clientY);

    // Determine which camera and panel rect to use for raycasting
    let cam, panelRect;
    if (panel === 'm') { cam = mainCam; panelRect = P.m; }
    else if (panel === 's') { cam = secCam; panelRect = P.s; }
    else return; // combined panel — no direct selection

    const ndc = toNDC(e.clientX, e.clientY, panelRect);
    rc.setFromCamera(ndc, cam);

    let best = null, bestD = Infinity;
    for (const obj of S.objs) {
        const hits = rc.intersectObject(obj, true);
        if (hits.length && hits[0].distance < bestD) {
            bestD = hits[0].distance;
            best = obj;
        }
    }

    if (best) {
        sel(best);
        S._selCam = cam; S._selPanel = panelRect;
        const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(cam.quaternion);
        const c = new THREE.Vector3();
        new THREE.Box3().setFromObject(best).getCenter(c);
        S.dragPlane.setFromNormalAndCoplanarPoint(dir, c);
        rc.ray.intersectPlane(S.dragPlane, hitPt);
        S.dragOff.copy(best.position).sub(hitPt);
        S.dragging = true;
        canvas.style.cursor = 'grabbing';
    } else {
        sel(null);
    }
});

canvas.addEventListener('pointermove', e => {
    if (!S.dragging || !S.sel) return;
    const cam = S._selCam || mainCam;
    const panel = S._selPanel || P.m;
    const ndc = toNDC(e.clientX, e.clientY, panel);
    rc.setFromCamera(ndc, cam);
    if (rc.ray.intersectPlane(S.dragPlane, hitPt)) {
        S.sel.position.x = hitPt.x + S.dragOff.x;
        S.sel.position.y = hitPt.y + S.dragOff.y;
    }
});

canvas.addEventListener('pointerup', () => { S.dragging = false; canvas.style.cursor = ''; });

/* ================================================================
   UI
   ================================================================ */
$('sld-d').oninput = function () {
    S.depthD = +this.value;
    $('vd').textContent = S.depthD.toFixed(1);
    refreshH();
};

/* ── Autofocus: interactive rectangle on Main panel ── */
const afState = { active: false, dragging: false, x0: 0, y0: 0 };
const afRect = $('af-rect');

function runAF(screenRect) {
    // screenRect = { x, y, w, h } in CSS px relative to viewport-container
    if (!mainCam || screenRect.w < 2 || screenRect.h < 2) return;
    const near = mainCam.near, far = mainCam.far;

    // Map screen rect → RT pixel coords
    // Panel uses panelAspect, RT uses rtAspect (16:9). Vertical FOV matches,
    // horizontal coverage differs. Must correct horizontal mapping.
    const cont = $('viewport-container').getBoundingClientRect();
    const cssTop = cont.height - P.m.y - P.m.h;
    const panelAspect = P.m.w / P.m.h;
    const rtAspect = RT_W / RT_H;

    // Normalize rect within main panel [0,1]
    const nx0 = (screenRect.x - P.m.x) / P.m.w;
    const ny0 = (screenRect.y - cssTop) / P.m.h;
    const nx1 = nx0 + screenRect.w / P.m.w;
    const ny1 = ny0 + screenRect.h / P.m.h;

    // Convert panel-normalized x → RT-normalized x (correct for aspect diff)
    // Panel NDC_x = (nx * 2 - 1), maps to RT NDC_x via: ndc_rt = ndc_panel * panelAspect / rtAspect
    // Then RT normalized = (ndc_rt + 1) / 2
    const toRTx = (nx) => ((nx * 2 - 1) * panelAspect / rtAspect + 1) / 2;
    // Vertical maps directly (same vFOV)
    const toRTy = (ny) => ny;

    const rx0 = Math.max(0, Math.floor(toRTx(nx0) * RT_W));
    const rx1 = Math.min(RT_W, Math.ceil(toRTx(nx1) * RT_W));
    // Y-flip: CSS top=0 → RT y=RT_H (GL origin at bottom)
    const ry0 = Math.max(0, Math.floor((1 - toRTy(ny1)) * RT_H));
    const ry1 = Math.min(RT_H, Math.ceil((1 - toRTy(ny0)) * RT_H));
    const rtX = rx0, rtY = ry0;
    const rtW = rx1 - rx0, rtH = ry1 - ry0;
    if (rtW < 1 || rtH < 1) return;

    // Render depth pass
    const prevOverride = scene.overrideMaterial;
    scene.overrideMaterial = depthMat;
    mainCam.aspect = RT_W / RT_H;
    mainCam.updateProjectionMatrix();
    renderer.setRenderTarget(rtDepth);
    renderer.clear();
    renderer.render(scene, mainCam);
    scene.overrideMaterial = prevOverride;
    renderer.setRenderTarget(null);

    // Read selected region
    const buf = new Uint8Array(rtW * rtH * 4);
    renderer.readRenderTargetPixels(rtDepth, rtX, rtY, rtW, rtH, buf);

    // Unpack RGBA depth → perspective NDC → linear distance
    const depths = [];
    const n = rtW * rtH;
    for (let i = 0; i < n; i++) {
        const r = buf[i * 4], g = buf[i * 4 + 1], b = buf[i * 4 + 2], a = buf[i * 4 + 3];
        const ndc = (r / 256 + g / 65536 + b / 16777216 + a / 4294967296);
        if (ndc >= 0.999) continue;
        const viewZ = (near * far) / ((far - near) * ndc - far);
        const dist = -viewZ;
        if (dist > near && dist < far * 0.95) depths.push(dist);
    }
    if (depths.length === 0) return;

    // Histogram: 0.1m bins, pick majority
    const binSize = 0.1;
    const bins = new Map();
    for (const d of depths) {
        const key = Math.round(d / binSize);
        bins.set(key, (bins.get(key) || 0) + 1);
    }
    let bestKey = 0, bestCount = 0;
    for (const [k, c] of bins) {
        if (c > bestCount) { bestCount = c; bestKey = k; }
    }
    const focusD = Math.max(0.1, Math.min(10, bestKey * binSize));

    S.depthD = focusD;
    $('sld-d').value = focusD;
    $('vd').textContent = focusD.toFixed(1);
    refreshH();
}

$('btn-af').onclick = () => {
    afState.active = !afState.active;
    $('btn-af').classList.toggle('active', afState.active);
    if (!afState.active) {
        afRect.style.display = 'none';
        afState.dragging = false;
        canvas.style.cursor = '';
    } else {
        canvas.style.cursor = 'crosshair';
    }
};

canvas.addEventListener('pointerdown', (e) => {
    if (!afState.active) return;
    const cont = $('viewport-container').getBoundingClientRect();
    afState.x0 = e.clientX - cont.left;
    afState.y0 = e.clientY - cont.top;
    afState.dragging = true;
    afRect.style.left = afState.x0 + 'px';
    afRect.style.top = afState.y0 + 'px';
    afRect.style.width = '0px';
    afRect.style.height = '0px';
    afRect.style.display = 'block';
    e.preventDefault();
    e.stopPropagation();
}, true);  // capture phase to intercept before other handlers

canvas.addEventListener('pointermove', (e) => {
    if (!afState.active || !afState.dragging) return;
    const cont = $('viewport-container').getBoundingClientRect();
    const cx = e.clientX - cont.left;
    const cy = e.clientY - cont.top;
    const x = Math.min(afState.x0, cx);
    const y = Math.min(afState.y0, cy);
    const w = Math.abs(cx - afState.x0);
    const h = Math.abs(cy - afState.y0);
    afRect.style.left = x + 'px';
    afRect.style.top = y + 'px';
    afRect.style.width = w + 'px';
    afRect.style.height = h + 'px';
    e.preventDefault();
    e.stopPropagation();
}, true);

canvas.addEventListener('pointerup', (e) => {
    if (!afState.active || !afState.dragging) return;
    afState.dragging = false;
    const cont = $('viewport-container').getBoundingClientRect();
    const cx = e.clientX - cont.left;
    const cy = e.clientY - cont.top;
    const x = Math.min(afState.x0, cx);
    const y = Math.min(afState.y0, cy);
    const w = Math.abs(cx - afState.x0);
    const h = Math.abs(cy - afState.y0);

    // Run AF on the selected rectangle
    runAF({ x, y, w, h });

    // Exit AF mode
    afState.active = false;
    $('btn-af').classList.remove('active');
    canvas.style.cursor = '';
    // Keep rect visible briefly then hide
    setTimeout(() => { afRect.style.display = 'none'; }, 500);

    e.preventDefault();
    e.stopPropagation();
}, true);

/* ── Play: animate zoom 0.5→2.0→0.5 repeatedly ── */
let playAnim = null;
$('btn-play').onclick = () => {
    if (playAnim) {
        cancelAnimationFrame(playAnim);
        playAnim = null;
        $('btn-play').classList.remove('active');
        $('btn-play').textContent = '\u25B6 Play';
        return;
    }
    $('btn-play').classList.add('active');
    $('btn-play').textContent = '\u25A0 Stop';
    const speed = 0.008; // zoom units per frame (~0.5→2.0 in ~3 seconds at 60fps)
    let dir = 1;
    function tick() {
        S.zoom += speed * dir;
        if (S.zoom >= 2.0) { S.zoom = 2.0; dir = -1; }
        if (S.zoom <= 0.5) { S.zoom = 0.5; dir = 1; }
        $('sld-z').value = S.zoom;
        $('vz').textContent = S.zoom.toFixed(2) + 'x';
        const src = S.zoom <= 1 ? 'Sec' : 'Main';
        $('lbl-c').textContent = `\u25CE Combined — ${src} @ ${S.zoom.toFixed(2)}x`;
        refreshH();
        playAnim = requestAnimationFrame(tick);
    }
    playAnim = requestAnimationFrame(tick);
};

$('sld-od').oninput = function () {
    if (!S.sel) return;
    const target = +this.value;
    $('vod').textContent = target.toFixed(1);
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(mainCam.quaternion);
    const c = new THREE.Vector3();
    new THREE.Box3().setFromObject(S.sel).getCenter(c);
    const cur = c.sub(mainCam.position).dot(dir);
    S.sel.position.addScaledVector(dir, target - cur);
};

$('btn-reset').onclick = () => {
    resetPositions();
    sel(null);
    S.depthD = 3; $('sld-d').value = 3; $('vd').textContent = '3.0';
    S.zoom = 1; $('sld-z').value = 1; $('vz').textContent = '1.00x';
    S.warp = false;

};

/* ================================================================
   HOMOGRAPHY
   ================================================================ */
/* Display any 3×3 homography matrix on the overlay */
function displayH(H, label) {
    const f = v => (v >= 0 ? ' ' : '') + v.toFixed(4);
    $('hmat').innerHTML =
        `<span style="color:#e94560">${label || 'H'}</span>\n` +
        `┌ ${f(H[0])}  ${f(H[1])}  ${f(H[2])} ┐\n` +
        `│ ${f(H[3])}  ${f(H[4])}  ${f(H[5])} │\n` +
        `└ ${f(H[6])}  ${f(H[7])}  ${f(H[8])} ┘`;
}

/* zoomMatrix — imported from ./src/homography.js */

function refreshH() {
    if (!S.camParams) return;

    const H = computeH(S.camParams, S.depthD);

    // Prewarp scale: S scales secondary image around center
    // Pipeline: secondary_tex → S (prescale) → H·S⁻¹ (homography unwarps S) → Z (zoom)
    // Shader inverse: source = S · H⁻¹ · zoom_crop(output_px)
    //   because (H·S⁻¹)⁻¹ = S·H⁻¹
    const Sp = zoomMatrix(S.prewarpScale, RT_W, RT_H);
    const Hinv = M.inv(H);

    if (S.warp) {
        // Warp ON: prewarp S is fully compensated by H, shader sees only H⁻¹
        if (Hinv) {
            matWarp.uniforms.uHi.value.set(
                Hinv[0], Hinv[1], Hinv[2],
                Hinv[3], Hinv[4], Hinv[5],
                Hinv[6], Hinv[7], Hinv[8]);
        }
    } else {
        // Warp OFF: show prewarp scale only (no homography)
        matWarp.uniforms.uHi.value.set(
            Sp[0], Sp[1], Sp[2],
            Sp[3], Sp[4], Sp[5],
            Sp[6], Sp[7], Sp[8]);
    }
    matWarp.uniforms.uZ.value = S.zoom;
    matWarp.uniforms.uW.value = S.warp || S.prewarpScale !== 1.0;
    matWarp.uniforms.uCrop.value = S.zoom;

    // Effective forward H applied to image:
    // Warp ON:  H_eff = Z⁻¹ · H  (prewarp fully compensated)
    // Warp OFF: H_eff = Z⁻¹ · S⁻¹ (just prescale + zoom)
    const Z = zoomMatrix(S.zoom, RT_W, RT_H);
    const Zi = M.inv(Z) || M.id();
    const Si = M.inv(Sp) || M.id();
    const H_eff = S.warp ? M.mul(Zi, H) : M.mul(Zi, Si);
    const s = H_eff[8];
    if (Math.abs(s) > 1e-10) for (let i = 0; i < 9; i++) H_eff[i] /= s;

    const src = S.zoom <= 1 ? 'Sec' : 'Main';
    const pw = S.prewarpScale !== 1.0 ? ` PW=${S.prewarpScale.toFixed(2)}` : '';
    displayH(H_eff, `H_applied (D=${S.depthD.toFixed(1)} Z=${S.zoom.toFixed(2)}${pw} ${src})`);
}
refreshH();

/* ================================================================
   RESIZE
   ================================================================ */
function onResize() {
    const r = $('viewport-container').getBoundingClientRect();
    renderer.setSize(r.width, r.height);
    layoutPanels();
}
window.addEventListener('resize', onResize);
onResize();

/* ================================================================
   RENDER LOOP
   Layout: Top row = Main + Secondary, Bottom row = Combined (2x size)
   Main panel rendered directly for pixel-perfect raycasting.
   Secondary + Combined rendered via RT quads.
   ================================================================ */
const matSecQ = new THREE.MeshBasicMaterial({ map: rtS.texture });

function frame() {
    requestAnimationFrame(frame);

    mainCam.updateMatrixWorld(true);
    secCam.updateMatrixWorld(true);

    const rtAspect = RT_W / RT_H;  // 16:9 — must match K matrix in computeH

    // ── RT renders (linear space) — camera aspect must match RT for correct homography ──
    renderer.outputColorSpace = THREE.LinearSRGBColorSpace;

    mainCam.aspect = rtAspect;
    mainCam.updateProjectionMatrix();
    renderer.setRenderTarget(rtM);
    renderer.clear();
    renderer.render(scene, mainCam);

    secCam.aspect = rtAspect;
    secCam.updateProjectionMatrix();
    renderer.setRenderTarget(rtS);
    renderer.clear();
    renderer.render(scene, secCam);

    // ── Screen output (sRGB) — switch camera aspect to match panel for direct renders ──
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setRenderTarget(null);
    renderer.clear();

    const panelAspect = P.m.w / P.m.h;
    mainCam.aspect = panelAspect;
    mainCam.updateProjectionMatrix();
    secCam.aspect = panelAspect;
    secCam.updateProjectionMatrix();

    // Panel: Main camera — DIRECT render (top-left)
    renderer.setViewport(P.m.x, P.m.y, P.m.w, P.m.h);
    renderer.setScissor(P.m.x, P.m.y, P.m.w, P.m.h);
    renderer.setScissorTest(true);
    renderer.render(scene, mainCam);

    // Panel: Secondary camera — DIRECT render (top-right)
    renderer.setViewport(P.s.x, P.s.y, P.s.w, P.s.h);
    renderer.setScissor(P.s.x, P.s.y, P.s.w, P.s.h);
    renderer.render(scene, secCam);

    // Panel: Combined — warp shader (bottom, full width)
    renderer.setViewport(P.c.x, P.c.y, P.c.w, P.c.h);
    renderer.setScissor(P.c.x, P.c.y, P.c.w, P.c.h);
    quad.material = matWarp;
    renderer.render(dScene, dCam);

    renderer.setScissorTest(false);
}
frame();
