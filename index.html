<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VectorScope — Stereo Camera Homography Visualizer</title>
<!--
  VectorScope — Stereo Camera Homography Visualizer
  ==================================================
  Two-row layout:
    Top row:    Bird's Eye (canvas) | Object Info (DOM) | Controls (DOM)
    Bottom row: Main Camera | Secondary 1 | Secondary 2 | Combined (all canvas)

  See architecture.md for the full system design document.
-->
<style>
/* ── Global Reset & Body ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e; color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; height: 100vh; user-select: none;
}

/* ── App Layout: single viewport fills the entire window ── */
#app { display: flex; flex-direction: column; height: 100vh; }
#viewport-container { flex: 1; position: relative; overflow: hidden; }
#main-canvas { display: block; width: 100%; height: 100%; }

/* ── DOM Overlay Panels (top row: info + controls) ── */
#panel-info, #panel-controls {
    position: absolute;
    background: rgba(22, 33, 62, 0.92);
    border-left: 1px solid #0f3460;
    border-bottom: 1px solid #0f3460;
    padding: 10px 12px;
    overflow-y: auto;
    z-index: 10;
    /* JS sets left, top, width, height */
}
#panel-info .panel-title, #panel-controls .panel-title {
    font-size: 11px; color: #888; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
}

/* ── Control rows inside the controls panel ── */
.ctrl-row {
    display: flex; align-items: center; gap: 4px;
    margin-bottom: 6px; flex-wrap: wrap;
}

/* ── Shared UI elements ── */
.cg { display: flex; align-items: center; gap: 3px; }
label { font-size: 12px; color: #aaa; }
button {
    padding: 3px 10px; background: #0f3460; color: #e0e0e0;
    border: 1px solid #533483; border-radius: 4px; cursor: pointer;
    font-size: 12px; transition: background .15s;
}
button:hover { background: #533483; }
button.active { background: #e94560; border-color: #e94560; }
.sld-btn {
    padding: 1px 6px; font-size: 14px; line-height: 1;
    background: #0f3460; border: 1px solid #533483; border-radius: 3px;
    color: #e0e0e0; cursor: pointer; font-weight: bold;
}
.sld-btn:hover { background: #533483; }
.zp-btn { padding: 2px 7px; font-size: 11px; font-family: monospace; }
.zp-btn.active { background: #e94560; border-color: #e94560; }
input[type="range"] { width: 100px; accent-color: #e94560; }
input[type="file"] { display: none; }
.val {
    min-width: 40px; text-align: right; font-size: 12px;
    color: #e94560; font-family: monospace;
}
.sep { width: 1px; height: 18px; background: #0f3460; }
#selinfo { font-size: 12px; color: #aaa; }
/* Inline camera parameter inputs in info panel */
.cam-inp {
    width: 58px; padding: 1px 4px; margin: 0 2px;
    background: #0a0f1e; color: #e0e0e0; border: 1px solid #533483;
    border-radius: 3px; font-family: monospace; font-size: 11px; text-align: right;
}
.cam-inp:focus { outline: none; border-color: #e94560; }
.cam-lbl { color: #888; font-size: 10px; margin-right: 1px; }

/* ── Panel labels: positioned absolutely over the canvas ── */
.plbl {
    position: absolute; padding: 3px 10px;
    background: rgba(15,52,96,.85); border-radius: 3px;
    font-size: 11px; pointer-events: none; z-index: 10; white-space: nowrap;
}

/* ── Red border outline around each camera view ── */
.pborder {
    position: absolute; box-sizing: border-box;
    border: 2px solid #ff2b2b;
    pointer-events: none; z-index: 8;
}

/* ── Panel separators ── */
.panel-sep-v {
    position: absolute; top: 0; width: 2px;
    background: #e94560; pointer-events: none; z-index: 5; opacity: 0.7;
}
.panel-sep-h {
    position: absolute; left: 0; width: 100%; height: 2px;
    background: #e94560; pointer-events: none; z-index: 5; opacity: 0.7;
}

/* ── Homography Matrix HUD (top-right of Combined panel) ── */
#hmat {
    position: fixed; bottom: 16px; right: 16px;
    padding: 8px 12px; background: rgba(15,52,96,.92);
    border: 1px solid #533483; border-radius: 6px;
    font-family: monospace; font-size: 11px; color: #e0e0e0;
    pointer-events: none; z-index: 20; white-space: pre; line-height: 1.5;
}
/* ── Status HUD ── */
#status {
    position: fixed; bottom: 100px; right: 16px;
    padding: 4px 10px; background: rgba(15,52,96,.9);
    border-radius: 4px; font-size: 11px; color: #888;
    pointer-events: none; z-index: 20;
}

/* ── Camera Settings Dialog ── */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,.6); z-index: 100; justify-content: center; align-items: center;
}
.modal-overlay.open { display: flex; }
.modal {
    background: #16213e; border: 1px solid #533483; border-radius: 8px;
    padding: 20px; min-width: 520px; max-width: 90vw; max-height: 85vh;
    overflow-y: auto; color: #e0e0e0; font-size: 13px;
}
.modal h2 { margin: 0 0 14px; font-size: 16px; color: #e94560; }
.modal h3 { margin: 12px 0 6px; font-size: 13px; color: #4fc3f7; border-bottom: 1px solid #0f3460; padding-bottom: 4px; }
.modal table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
.modal td { padding: 3px 8px; font-family: monospace; font-size: 12px; }
.modal td:first-child { color: #aaa; width: 140px; }
.modal td:last-child { color: #e0e0e0; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
.modal-actions button { padding: 6px 16px; }
.modal input[type="number"] {
    width: 80px; padding: 2px 6px; background: #0a0f1e; color: #e0e0e0;
    border: 1px solid #533483; border-radius: 3px; font-family: monospace;
    font-size: 12px; text-align: right;
}
.modal input[type="number"]:focus { outline: none; border-color: #e94560; }
.cam-field { display: inline-flex; align-items: center; gap: 4px; }
.cam-field label { color: #888; font-size: 11px; min-width: 14px; }
</style>
</head>

<script type="module">
/* ── Error Handlers ── */
window.addEventListener('error', e => {
    const el = document.getElementById('status');
    if (el) el.textContent = `ERR: ${e.message} @ ${e.filename}:${e.lineno}`;
});
window.addEventListener('unhandledrejection', e => {
    const el = document.getElementById('status');
    if (el) el.textContent = `ERR: ${e.reason}`;
});

/* ── Module Imports ── */
import * as THREE from 'three';
import { GLTFLoader } from './lib/GLTFLoader.js?v=30';
import { DRACOLoader } from './lib/DRACOLoader.js?v=30';
import { M } from './src/math.js';
import { SCENE_CAM, DEF_CAM } from './src/camera.js';
import { computeHPair, zoomMatrix } from './src/homography.js';
import { initLoader, loadScene, getLoaderState, resetPositions } from './src/loader.js';
import { renderCamDialog, readCamInputs, readSceneInputs, bindDialog } from './src/camera-dialog.js';
import { createWarpMaterial } from './src/shader.js';
import { createPanelManager } from './src/panels.js';
import { initInteraction } from './src/interaction.js';
import { initSelectionPanel } from './src/selection-panel.js';
import { initAutofocus } from './src/autofocus.js';

/* ── Helpers ── */
const $ = id => document.getElementById(id);
function log(msg) { $('status').textContent = msg; console.log('[VS]', msg); }
log('Three.js loaded');

/** Nudge a slider by ±0.1, clamped to [min, max]. */
window.nudge = function(id, dir) {
    const s = $(id);
    if (s.disabled) return;
    const v = Math.min(parseFloat(s.max), Math.max(parseFloat(s.min), parseFloat(s.value) + dir * 0.1));
    s.value = v;
    s.dispatchEvent(new Event('input'));
};

/* ================================================================
   STATE
   ================================================================ */
const S = {
    warp: false, zoom: 1.0, prewarpScale: 1.0, prewarpScale2: 1.0, depthD: 3.0,
    clipY: 2.0,            // BEV clipping plane height
    sel: null, selCam: null, // selected object / selected camera name
    dragging: false,
    dragPlane: new THREE.Plane(), dragOff: new THREE.Vector3(),
    objs: [], origPos: new Map(), camParams: null,
};

/* ================================================================
   RENDERER
   ================================================================ */
const canvas = $('main-canvas');
let renderer;
try {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'default', failIfMajorPerformanceCaveat: false });
} catch (e) {
    log(`WebGL failed: ${e.message}`);
    throw e;
}
canvas.addEventListener('webglcontextlost', (e) => { log('WebGL context lost'); e.preventDefault(); });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x1a1a2e);
renderer.autoClear = false;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a3e);

const aLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(aLight);
const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
dLight.position.set(5, 8, 5);
scene.add(dLight);

/* ================================================================
   CAMERAS
   - mainCam, secCam, sec2Cam: PerspectiveCamera (from intrinsics)
   - bevCam: OrthographicCamera looking straight down for Bird's Eye
   - Camera markers: colored indicators on layer 1 (BEV-only)
   ================================================================ */
const RT_W = 1080, RT_H = 1920;   // portrait 9:16, matches camera windows
const BEV_SIZE = 6;
let mainCam, secCam, sec2Cam;
let bevCam;
let camMarkers = [];              // Group objects for BEV camera indicators
const camMarkerMap = new Map();   // Map<Group, camName> for BEV click detection

/* ── BEV Ghost Mode ──
   Objects entirely above S.clipY are rendered semi-transparent in the
   BEV pass (instead of hard-clipped), so ceilings/roofs don't block the
   top-down view but remain visible as translucent outlines. */
const _ghostBox = new THREE.Box3();
const _ghosted = [];

/** Swap meshes above the ghost height to translucent clone materials. */
function applyBevGhost() {
    scene.traverse(o => {
        if (!o.isMesh || o.layers.mask !== 1) return;  // layer-0 scene meshes only
        const g = o.geometry;
        if (!g.boundingBox) g.computeBoundingBox();
        _ghostBox.copy(g.boundingBox).applyMatrix4(o.matrixWorld);
        if (_ghostBox.min.y > S.clipY) {
            if (!o.userData._ghostMat) {
                const mk = m => { const c = m.clone(); c.transparent = true; c.opacity = 0.15; c.depthWrite = false; return c; };
                o.userData._ghostMat = Array.isArray(o.material) ? o.material.map(mk) : mk(o.material);
            }
            o.userData._realMat = o.material;
            o.material = o.userData._ghostMat;
            _ghosted.push(o);
        }
    });
}

/** Restore original materials after the BEV pass. */
function restoreBevGhost() {
    for (const o of _ghosted) o.material = o.userData._realMat;
    _ghosted.length = 0;
}

/** Create a PerspectiveCamera from intrinsic parameters. */
function makeCamFromIntrinsics(intrinsics, imageSize) {
    const { fy } = intrinsics;
    const [, h] = imageSize;
    const fov = 2 * Math.atan(h / (2 * fy)) * 180 / Math.PI;
    return new THREE.PerspectiveCamera(fov, 4/3, 0.01, 500);
}

/** Create a colored camera marker (sphere + direction line + FOV wedge) for BEV.
 *  @param {number} color - hex color
 *  @param {string} label - camera name
 *  @param {number} hfovRad - horizontal FOV in radians (for accurate wedge)
 */
function createCamMarker(color, label, hfovRad) {
    const group = new THREE.Group();
    group.userData.camLabel = label;
    // Clickable sphere — large radius, layer 0+1 so raycaster can hit it
    const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 16, 16),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.85, depthTest: false })
    );
    group.add(sphere);
    // Direction line
    const lineLen = 3.0;
    const pts = [new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-lineLen)];
    group.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color })
    ));
    // FOV wedge — computed from actual horizontal FOV
    const halfW = lineLen * Math.tan((hfovRad || 0.6) / 2);
    const wedge = [
        new THREE.Vector3(-halfW, 0, -lineLen),
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(halfW, 0, -lineLen),
    ];
    group.add(new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(wedge),
        new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.5 })
    ));
    // Set all children to layer 1 for BEV-only visibility
    group.traverse(c => c.layers.set(1));
    return group;
}

/** Compute horizontal FOV in radians from intrinsics. */
function hfovFromIntrinsics(intrinsics, imageSize) {
    return 2 * Math.atan(imageSize[0] / (2 * intrinsics.fx));
}

/**
 * Initialize all cameras from camera parameters.
 * Also (re)creates BEV camera and camera markers.
 */
function initCams(p) {
    if (mainCam) { scene.remove(mainCam); scene.remove(secCam); }
    if (sec2Cam) scene.remove(sec2Cam);
    camMarkers.forEach(m => scene.remove(m));
    camMarkers = [];
    S.camParams = p;

    // Main camera: SCENE_CAM provides base position/rotation,
    // main_camera.extrinsics adds offset (usually identity, but editable)
    mainCam = makeCamFromIntrinsics(p.main_camera.intrinsics, p.main_camera.image_size);
    const basePos = new THREE.Vector3(...SCENE_CAM.position);
    const [rx, ry, rz] = SCENE_CAM.rotation_euler_deg.map(d => d * Math.PI / 180);
    const baseQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(rx, ry, rz, 'ZYX'));
    // Apply main camera extrinsics offset (relative to scene camera)
    const mainOff = new THREE.Vector3(...(p.main_camera.extrinsics?.position || [0,0,0]));
    mainCam.position.copy(mainOff.applyQuaternion(baseQuat).add(basePos));
    const mainRotDeg = p.main_camera.extrinsics?.rotation_euler_deg || [0,0,0];
    const mainRotRad = mainRotDeg.map(d => d * Math.PI / 180);
    const mainRelQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(mainRotRad[0], mainRotRad[1], mainRotRad[2], 'ZYX'));
    mainCam.quaternion.copy(baseQuat).multiply(mainRelQuat);
    scene.add(mainCam);

    // Secondary camera 1 (relative to main camera)
    secCam = makeCamFromIntrinsics(p.secondary_camera.intrinsics, p.secondary_camera.image_size);
    const relPos = new THREE.Vector3(...p.secondary_camera.extrinsics.position);
    secCam.position.copy(relPos.clone().applyQuaternion(mainCam.quaternion).add(mainCam.position));
    const relRot = p.secondary_camera.extrinsics.rotation_euler_deg.map(d => d * Math.PI / 180);
    const relQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(relRot[0], relRot[1], relRot[2], 'ZYX'));
    secCam.quaternion.copy(mainCam.quaternion).multiply(relQuat);
    scene.add(secCam);

    // Secondary camera 2 (relative to main camera)
    if (p.secondary_camera_2) {
        sec2Cam = makeCamFromIntrinsics(p.secondary_camera_2.intrinsics, p.secondary_camera_2.image_size);
        const relPos2 = new THREE.Vector3(...p.secondary_camera_2.extrinsics.position);
        sec2Cam.position.copy(relPos2.clone().applyQuaternion(mainCam.quaternion).add(mainCam.position));
        const relRot2 = p.secondary_camera_2.extrinsics.rotation_euler_deg.map(d => d * Math.PI / 180);
        const relQuat2 = new THREE.Quaternion().setFromEuler(new THREE.Euler(relRot2[0], relRot2[1], relRot2[2], 'ZYX'));
        sec2Cam.quaternion.copy(mainCam.quaternion).multiply(relQuat2);
        scene.add(sec2Cam);
    }

    // Bird's Eye camera (orthographic, looking straight down)
    if (!bevCam) {
        bevCam = new THREE.OrthographicCamera(-BEV_SIZE, BEV_SIZE, BEV_SIZE, -BEV_SIZE, 0.1, 100);
        bevCam.layers.enable(1);  // see camera markers on layer 1
    }
    // Center BEV slightly ahead of the main camera (along its forward
    // direction on XZ), so the camera rig sits in the lower part of the
    // window and the scene fills the middle/upper area.
    const bevFwd = new THREE.Vector3(0, 0, -1).applyQuaternion(mainCam.quaternion);
    bevFwd.y = 0;
    if (bevFwd.lengthSq() < 1e-6) bevFwd.set(0, 0, -1);
    bevFwd.normalize();
    const bevCx = mainCam.position.x + bevFwd.x * BEV_SIZE * 0.4;
    const bevCz = mainCam.position.z + bevFwd.z * BEV_SIZE * 0.4;
    bevCam.position.set(bevCx, 20, bevCz);
    bevCam.lookAt(bevCx, 0, bevCz);

    // Camera markers (visible only in BEV via layer 1) — FOV wedge matches actual HFOV
    camMarkerMap.clear();

    const hfov1 = hfovFromIntrinsics(p.main_camera.intrinsics, p.main_camera.image_size);
    const mk1 = createCamMarker(0x4fc3f7, 'Main Camera', hfov1);
    scene.add(mk1);
    camMarkers.push(mk1);
    camMarkerMap.set(mk1, 'Main Camera');

    const hfov2 = hfovFromIntrinsics(p.secondary_camera.intrinsics, p.secondary_camera.image_size);
    const mk2 = createCamMarker(0x81c784, 'Secondary 1', hfov2);
    scene.add(mk2);
    camMarkers.push(mk2);
    camMarkerMap.set(mk2, 'Secondary 1');

    if (sec2Cam) {
        const hfov3 = hfovFromIntrinsics(p.secondary_camera_2.intrinsics, p.secondary_camera_2.image_size);
        const mk3 = createCamMarker(0xfff176, 'Secondary 2', hfov3);
        scene.add(mk3);
        camMarkers.push(mk3);
        camMarkerMap.set(mk3, 'Secondary 2');
    }
}

/** Update BEV camera aspect to match its panel shape. */
function updateBevAspect() {
    if (!bevCam || !P.bev.w) return;
    const aspect = P.bev.w / P.bev.h;
    bevCam.left = -BEV_SIZE * aspect;
    bevCam.right = BEV_SIZE * aspect;
    bevCam.updateProjectionMatrix();
}

/** Sync camera marker positions/rotations to their cameras each frame. */
function syncCamMarkers() {
    if (camMarkers[0] && mainCam) {
        camMarkers[0].position.copy(mainCam.position);
        camMarkers[0].quaternion.copy(mainCam.quaternion);
    }
    if (camMarkers[1] && secCam) {
        camMarkers[1].position.copy(secCam.position);
        camMarkers[1].quaternion.copy(secCam.quaternion);
    }
    if (camMarkers[2] && sec2Cam) {
        camMarkers[2].position.copy(sec2Cam.position);
        camMarkers[2].quaternion.copy(sec2Cam.quaternion);
    }
}

        onError: () => { if (isDefault && !getLoaderState().loaded) { addFallback(); log('Fallback scene'); } },

/* ── Fallback placeholder scene ──
   Shown if the glb hasn't loaded within 5s (slow network). Tracked in
   fallbackObjs so it can be fully removed once the real scene arrives —
   otherwise both scenes coexist (fallback race bug). */
let fallbackObjs = [];
function addFallback() {
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), new THREE.MeshStandardMaterial({ color: 0x3a3a5c }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);
    fallbackObjs.push(floor);
    const ls = getLoaderState();
    [[0xe94560,[-1.2,.4,2],'Red Cube',new THREE.BoxGeometry(.8,.8,.8)],
     [0x533483,[1,.5,3.5],'Purple Sphere',new THREE.SphereGeometry(.5,32,32)],
     [0x0f3460,[0,.55,1],'Blue Torus',new THREE.TorusGeometry(.35,.12,16,48)],
     [0x16c79a,[2,.5,4],'Green Cone',new THREE.ConeGeometry(.35,1,32)],
     [0xf5a623,[-2,.5,3.5],'Orange Cyl',new THREE.CylinderGeometry(.25,.25,1,32)],
    ].forEach(([c,p,n,g]) => {
        const m = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ color: c, roughness: .3 }));
        m.position.set(...p); m.name = n; scene.add(m);
        fallbackObjs.push(m);
        ls.objs.push(m); ls.origPos.set(m.uuid, m.position.clone());
    });
    S.objs = ls.objs; S.origPos = ls.origPos; ls.loaded = true;
}

/** Remove fallback placeholders once the real scene finishes loading. */
function removeFallback() {
    if (!fallbackObjs.length) return;
    const ls = getLoaderState();
    for (const o of fallbackObjs) {
        scene.remove(o);
        const i = ls.objs.indexOf(o);
        if (i >= 0) ls.objs.splice(i, 1);
        ls.origPos.delete(o.uuid);
        if (S.sel === o) sel(null);
    }
    fallbackObjs = [];
    S.objs = ls.objs; S.origPos = ls.origPos;
}

/* ── Zoom preset buttons: animated transition to target zoom ──
   Eases from the current zoom to the target in log space (~600ms),
   so the perceived zoom speed is uniform across all segments. */
let presetAnim = null;
function stopPresetAnim() {
    if (presetAnim) { cancelAnimationFrame(presetAnim); presetAnim = null; }
}
function animateZoomTo(target) {
    stopPlay();
    stopPresetAnim();
    const from = Math.log10(S.zoom), to = Math.log10(target);
    if (Math.abs(to - from) < 1e-6) return;
    const dur = 600;   // ms
    const t0 = performance.now();
    const ease = t => t < 0.5 ? 2 * t * t : 1 - (-2 * t + 2) ** 2 / 2;  // easeInOutQuad
    function step(now) {
        const t = Math.min((now - t0) / dur, 1);
        const lv = from + (to - from) * ease(t);
        S.zoom = 10 ** lv;
        $('sld-z').value = lv;
        updateZoomUI();
        refreshH();
        presetAnim = t < 1 ? requestAnimationFrame(step) : null;
    }
    presetAnim = requestAnimationFrame(step);
}

};

/* ================================================================
   HOMOGRAPHY
   ================================================================ */
function displayH(H, label) {
    const f = v => (v >= 0 ? ' ' : '') + v.toFixed(4);
    $('hmat').innerHTML = `<span style="color:#e94560">${label || 'H'}</span>\n` +
        `\u250C ${f(H[0])}  ${f(H[1])}  ${f(H[2])} \u2510\n` +
        `\u2502 ${f(H[3])}  ${f(H[4])}  ${f(H[5])} \u2502\n` +
        `\u2514 ${f(H[6])}  ${f(H[7])}  ${f(H[8])} \u2518`;
}

/** Normalize both matrices to h33 = 1, blend elementwise, renormalize.
 *  Linear matrix interpolation per confirmed design (t computed in log-zoom space). */
function normLerp(A, B, t) {
    const a = A.map(v => v / A[8]);
    const b = B.map(v => v / B[8]);
    const o = a.map((v, i) => v + (b[i] - v) * t);
    const s = o[8];
    if (Math.abs(s) > 1e-10) for (let i = 0; i < 9; i++) o[i] /= s;
    return o;
}

/* 4-segment continuous zoom pipeline (sampling matrix: output px → source px).
   Source intervals are half-open — boundary zoom belongs to the NEXT camera:
   Segment A  [0.5, 1.0)x : source = sec1;  warp ON: normLerp(I, H(sec1←main), log t)
   Segment B  [1.0, 2.0]x : source = main;  plain crop(z)
   Segment C  (2.0, 5.0)x : source = main;  warp ON: normLerp(crop(2), H(main←sec2 view), log t)
   Segment D  [5.0, 10 ]x : source = sec2;  plain crop(z/5)
   So z=1.0 → main full frame; z=5.0 → sec2 full frame.
   Warp OFF: A → prewarp1·crop(z) on sec1; C → prewarp2·crop(z) on main. */
function refreshH() {
    if (!S.camParams) return;
    const p = S.camParams;
    const z = S.zoom;
    const hasS2 = !!p.secondary_camera_2 && !!sec2Cam;
    let src, Msamp;

    if (z < 1.0) {
        /* ── Segment A: sec1 → main handover ── */
        src = 0;
        if (S.warp) {
            // Endpoint @1.0x: main px → sec1 px (computeHPair(cam1, cam2) maps cam2 px → cam1 px)
            const Hm2s1 = computeHPair(p.secondary_camera, p.main_camera, S.depthD);
            const t = Math.log(z / 0.5) / Math.log(2);   // log-space t: 0 @0.5x → 1 @1.0x
            Msamp = normLerp(M.id(), Hm2s1, t);
        } else {
            Msamp = M.mul(zoomMatrix(S.prewarpScale, RT_W, RT_H), zoomMatrix(z, RT_W, RT_H));
        }
    } else if (z <= 2.0 || !hasS2) {
        /* ── Segment B: main plain crop (also fallback when no sec2) ── */
        src = 1;
        Msamp = zoomMatrix(z, RT_W, RT_H);
    } else if (z < 5.0) {
        /* ── Segment C: main → sec2 handover ── */
        src = 1;
        if (S.warp) {
            // Start @2.0x: crop(2); endpoint @5.0x: sec2-view px → main px
            const Hs2m = computeHPair(p.main_camera, p.secondary_camera_2, S.depthD);
            const t = Math.log(z / 2) / Math.log(2.5);   // log-space t: 0 @2x → 1 @5x
            Msamp = normLerp(zoomMatrix(2, RT_W, RT_H), Hs2m, t);
        } else {
            Msamp = M.mul(zoomMatrix(S.prewarpScale2, RT_W, RT_H), zoomMatrix(z, RT_W, RT_H));
        }
    } else {
        /* ── Segment D: sec2 direct, residual crop ── */
        src = 2;
        Msamp = zoomMatrix(z / 5, RT_W, RT_H);
    }

    matWarp.uniforms.uSrc.value = src;
    matWarp.uniforms.uHi.value.set(
        Msamp[0], Msamp[1], Msamp[2],
        Msamp[3], Msamp[4], Msamp[5],
        Msamp[6], Msamp[7], Msamp[8]);

    const H_disp = Msamp.slice();
    const s = H_disp[8];
    if (Math.abs(s) > 1e-10) for (let i = 0; i < 9; i++) H_disp[i] /= s;
    displayH(H_disp, `M_sample (D=${S.depthD.toFixed(1)} Z=${S.zoom.toFixed(2)} ${segName(z)}${S.warp ? '' : ' raw'})`);
}
window.refreshH = refreshH;
refreshH();

/* ================================================================
   RESIZE + RENDER LOOP

   Render passes per frame:
     1. scene → rtM   (main cam @ RT res, for Combined warp shader)
     2. scene → rtS   (sec1 cam @ RT res, for Combined warp shader)
     3. scene → BEV panel     (bevCam, orthographic top-down)
     4. scene → Main panel    (mainCam, direct)
     5. scene → Sec1 panel    (secCam, direct)
     6. scene → Sec2 panel    (sec2Cam, direct)
     7. quad  → Combined panel (warp shader)
   ================================================================ */
function onResize() {
    const r = $('viewport-container').getBoundingClientRect();
    renderer.setSize(r.width, r.height);
    layoutPanels();
    updateBevAspect();
}
window.addEventListener('resize', onResize);
onResize();

function frame() {
    requestAnimationFrame(frame);
    mainCam.updateMatrixWorld(true);
    secCam.updateMatrixWorld(true);
    if (sec2Cam) sec2Cam.updateMatrixWorld(true);
    syncCamMarkers();

    const rtAspect = RT_W / RT_H;

    /* Pass 1: Off-screen RT render for the Combined warp shader.
       Only the source RT needed by the current zoom segment is rendered:
       z < 1 → sec1 (rtS); 1 ≤ z < 5 → main (rtM); z ≥ 5 → sec2 (rtS2). */
    if (S.zoom < 1.0) {
        secCam.aspect = rtAspect; secCam.updateProjectionMatrix();
        renderer.setRenderTarget(rtS); renderer.clear(); renderer.render(scene, secCam);
    } else if (S.zoom < 5.0 || !sec2Cam) {
        mainCam.aspect = rtAspect; mainCam.updateProjectionMatrix();
        renderer.setRenderTarget(rtM); renderer.clear(); renderer.render(scene, mainCam);
    } else {
        sec2Cam.aspect = rtAspect; sec2Cam.updateProjectionMatrix();
        renderer.setRenderTarget(rtS2); renderer.clear(); renderer.render(scene, sec2Cam);
    }

    /* Pass 3-7: On-screen panel renders */
    renderer.setRenderTarget(null); renderer.clear(); renderer.setScissorTest(true);

    /* Pass 3: Bird's Eye — top-down view; objects above ghost height are translucent */
    applyBevGhost();
    renderer.setViewport(P.bev.x, P.bev.y, P.bev.w, P.bev.h);
    renderer.setScissor(P.bev.x, P.bev.y, P.bev.w, P.bev.h);
    renderer.render(scene, bevCam);
    restoreBevGhost();

    /* Pass 4: Main Camera panel */
    const panelAspect = P.m.w / P.m.h;
    mainCam.aspect = panelAspect; mainCam.updateProjectionMatrix();
    renderer.setViewport(P.m.x, P.m.y, P.m.w, P.m.h);
    renderer.setScissor(P.m.x, P.m.y, P.m.w, P.m.h);
    renderer.render(scene, mainCam);

    /* Pass 5: Secondary 1 panel */
    secCam.aspect = panelAspect; secCam.updateProjectionMatrix();
    renderer.setViewport(P.s1.x, P.s1.y, P.s1.w, P.s1.h);
    renderer.setScissor(P.s1.x, P.s1.y, P.s1.w, P.s1.h);
    renderer.render(scene, secCam);

    /* Pass 6: Secondary 2 panel */
    if (sec2Cam) {
        sec2Cam.aspect = panelAspect; sec2Cam.updateProjectionMatrix();
        renderer.setViewport(P.s2.x, P.s2.y, P.s2.w, P.s2.h);
        renderer.setScissor(P.s2.x, P.s2.y, P.s2.w, P.s2.h);
        renderer.render(scene, sec2Cam);
    }

    /* Pass 7: Combined panel — warp shader on fullscreen quad.
       The quad shows a 16:9 RT texture; letterbox inside the panel so the
       image keeps the RT aspect instead of stretching to the panel shape. */
    let cx = P.c.x, cy = P.c.y, cw = P.c.w, ch = P.c.h;
    if (cw / ch > rtAspect) { const nw = ch * rtAspect; cx += (cw - nw) / 2; cw = nw; }
    else                    { const nh = cw / rtAspect; cy += (ch - nh) / 2; ch = nh; }
    renderer.setScissor(P.c.x, P.c.y, P.c.w, P.c.h);  // clear full panel (black bars)
    renderer.setViewport(cx, cy, cw, ch);
    quad.material = matWarp; renderer.render(dScene, dCam);

    renderer.setScissorTest(false);
}
frame();

</script>
