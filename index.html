<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VectorScope — Stereo Camera Homography Visualizer</title>
<!--
  VectorScope — Stereo Camera Homography Visualizer
  ==================================================
  Entry point and application shell. This file contains:
    1. HTML structure — three-panel viewport, control bars, camera dialog
    2. CSS styles — dark theme, panel layout, modal dialog, HUD overlays
    3. WebGL pre-flight check — detects disabled WebGL before module loading
    4. Application bootstrap — module imports, renderer/camera/RT init,
       module wiring, UI event binding, homography computation, render loop

  Architecture:
    index.html acts as the "main function" that wires together 8 ES modules
    from src/. It owns the shared mutable state (S), the Three.js renderer,
    cameras, render targets, and the per-frame render loop. Each module is
    initialized via dependency injection (no module imports THREE directly
    except math/homography/camera which are pure).

  See architecture.md for the full system design document.
-->
<style>
/* ── Global Reset & Body ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e; color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; height: 100vh; user-select: none;
}
/* ── App Layout: vertical flex (top bar → viewport → bottom bar) ── */
#app { display: flex; flex-direction: column; height: 100vh; }
/* ── Top Control Bar: scene/camera buttons, sliders, warp toggle ── */
#controls-top {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 12px; background: #16213e;
    border-bottom: 1px solid #0f3460; flex-shrink: 0; flex-wrap: wrap;
}
/* ── Control Group: inline flex container for label + slider + value ── */
.cg { display: flex; align-items: center; gap: 3px; }
label { font-size: 12px; color: #aaa; }
button {
    padding: 3px 10px; background: #0f3460; color: #e0e0e0;
    border: 1px solid #533483; border-radius: 4px; cursor: pointer;
    font-size: 12px; transition: background .15s;
}
button:hover { background: #533483; }
button.active { background: #e94560; border-color: #e94560; }
.sld-btn {
    padding: 1px 6px; font-size: 14px; line-height: 1;
    background: #0f3460; border: 1px solid #533483; border-radius: 3px;
    color: #e0e0e0; cursor: pointer; font-weight: bold;
}
.sld-btn:hover { background: #533483; }
input[type="range"] { width: 110px; accent-color: #e94560; }
input[type="file"] { display: none; }
.val {
    min-width: 44px; text-align: right; font-size: 12px;
    color: #e94560; font-family: monospace;
}
/* ── Visual separator between control groups ── */
.sep { width: 1px; height: 22px; background: #0f3460; }
/* ── Viewport: fills remaining vertical space, hosts the WebGL canvas ── */
#viewport-container { flex: 1; position: relative; overflow: hidden; }
#main-canvas { display: block; width: 100%; height: 100%; }
/* ── Panel labels: positioned absolutely over the canvas via JS ── */
.plbl {
    position: absolute; padding: 3px 10px;
    background: rgba(15,52,96,.85); border-radius: 3px;
    font-size: 11px; pointer-events: none; z-index: 10; white-space: nowrap;
}
/* ── Panel separators: red lines between Main/Secondary and top/bottom rows ── */
.panel-sep-v {
    position: absolute; top: 0; width: 2px;
    background: #e94560; pointer-events: none; z-index: 5; opacity: 0.7;
}
.panel-sep-h {
    position: absolute; left: 0; width: 100%; height: 2px;
    background: #e94560; pointer-events: none; z-index: 5; opacity: 0.7;
}
/* ── Bottom Control Bar: selected object info + depth slider ── */
#controls-bottom {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 12px; background: #16213e;
    border-top: 1px solid #0f3460; flex-shrink: 0; flex-wrap: wrap;
}
#selinfo { font-size: 12px; color: #aaa; min-width: 140px; }
/* ── Status HUD: fixed bottom-right, shows load progress / errors ── */
#status {
    position: fixed; bottom: 40px; right: 16px;
    padding: 4px 10px; background: rgba(15,52,96,.9);
    border-radius: 4px; font-size: 11px; color: #888;
    pointer-events: none; z-index: 20;
}
/* ── Homography Matrix HUD: fixed top-right, shows H_applied in matrix form ── */
#hmat {
    position: fixed; top: 50px; right: 16px;
    padding: 8px 12px; background: rgba(15,52,96,.92);
    border: 1px solid #533483; border-radius: 6px;
    font-family: monospace; font-size: 12px; color: #e0e0e0;
    pointer-events: none; z-index: 20; white-space: pre; line-height: 1.6;
}
/* ── Camera Settings Dialog ── */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,.6); z-index: 100; justify-content: center; align-items: center;
}
.modal-overlay.open { display: flex; }
.modal {
    background: #16213e; border: 1px solid #533483; border-radius: 8px;
    padding: 20px; min-width: 520px; max-width: 90vw; max-height: 85vh;
    overflow-y: auto; color: #e0e0e0; font-size: 13px;
}
.modal h2 { margin: 0 0 14px; font-size: 16px; color: #e94560; }
.modal h3 { margin: 12px 0 6px; font-size: 13px; color: #4fc3f7; border-bottom: 1px solid #0f3460; padding-bottom: 4px; }
.modal table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
.modal td { padding: 3px 8px; font-family: monospace; font-size: 12px; }
.modal td:first-child { color: #aaa; width: 140px; }
.modal td:last-child { color: #e0e0e0; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
.modal-actions button { padding: 6px 16px; }
.modal input[type="number"] {
    width: 80px; padding: 2px 6px; background: #0a0f1e; color: #e0e0e0;
    border: 1px solid #533483; border-radius: 3px; font-family: monospace;
    font-size: 12px; text-align: right;
}
.modal input[type="number"]:focus { outline: none; border-color: #e94560; }
.cam-field { display: inline-flex; align-items: center; gap: 4px; }
.cam-field label { color: #888; font-size: 11px; min-width: 14px; }
</style>
</head>
<body>

<div id="status">Loading…</div>

<!--
  WebGL Pre-flight Check
  ======================
  This plain (non-module) script runs BEFORE the importmap and ES module scripts.
  It attempts to create a WebGL context on a throwaway canvas. If WebGL is
  unavailable (common on macOS Chrome with GPU acceleration disabled), it shows
  a full-screen error overlay with step-by-step fix instructions and throws
  to prevent the module scripts from loading (which would fail with cryptic errors).

  Why a separate <script> tag?
  - ES module scripts are deferred by default; this must run synchronously first.
  - If WebGL is missing, we want a clear error BEFORE Three.js tries to initialize.
-->
<script>
// Pre-flight WebGL check — must run before module imports
(function() {
    var c = document.createElement('canvas');
    var gl = c.getContext('webgl2') || c.getContext('webgl') || c.getContext('experimental-webgl');
    if (!gl) {
        var msg = document.createElement('div');
        msg.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);' +
            'color:#e0e0e0;display:flex;justify-content:center;align-items:center;z-index:9999;' +
            'font-family:system-ui,sans-serif;';
        msg.innerHTML = '<div style="max-width:560px;padding:32px;background:#16213e;border:1px solid #e94560;border-radius:12px;">' +
            '<h2 style="color:#e94560;margin:0 0 16px;">WebGL Not Available</h2>' +
            '<p style="line-height:1.7;margin:0 0 16px;">VectorScope requires WebGL, which is currently disabled or unavailable in your browser.</p>' +
            '<h3 style="color:#4fc3f7;margin:0 0 8px;">How to fix (Chrome):</h3>' +
            '<ol style="line-height:2;margin:0 0 16px;padding-left:20px;">' +
            '<li>Go to <code style="background:#0a0f1e;padding:2px 6px;border-radius:3px;">chrome://settings</code> &rarr; <b>System</b></li>' +
            '<li>Enable <b>"Use graphics acceleration when available"</b></li>' +
            '<li>Restart Chrome</li>' +
            '</ol>' +
            '<h3 style="color:#4fc3f7;margin:0 0 8px;">Still not working?</h3>' +
            '<ol style="line-height:2;margin:0;padding-left:20px;">' +
            '<li>Go to <code style="background:#0a0f1e;padding:2px 6px;border-radius:3px;">chrome://flags/#use-angle</code> &rarr; set to <b>OpenGL</b></li>' +
            '<li>Go to <code style="background:#0a0f1e;padding:2px 6px;border-radius:3px;">chrome://flags/#enable-webgl</code> &rarr; set to <b>Enabled</b></li>' +
            '<li>Restart Chrome</li>' +
            '</ol>' +
            '</div>';
        document.body.appendChild(msg);
        throw new Error('WebGL not available');
    }
})();
</script>
<script type="importmap">
{ "imports": { "three": "./lib/three.module.js?v=29" } }
</script>
<!--
  Main Application Module
  =======================
  This is the application entry point. It:
    1. Sets up global error handlers (surface errors in the status HUD)
    2. Imports all dependencies (Three.js, addons, 8 src modules)
    3. Initializes renderer, cameras, render targets, scene
    4. Wires modules together via dependency injection
    5. Binds UI controls to state
    6. Runs the per-frame render loop

  Module dependency graph:
    math.js ← homography.js ← index.html (refreshH)
    camera.js ← index.html (initCams, DEF_CAM)
    shader.js ← index.html (matWarp creation)
    panels.js ← index.html (layout) ← interaction.js, autofocus.js
    loader.js ← index.html (scene loading)
    camera-dialog.js ← index.html (dialog wiring)
    interaction.js ← index.html (selection/drag)
    autofocus.js ← index.html (AF system)

  Shared state object S is the single source of truth for all mutable app state.
  Modules receive S (or specific getters) via their init functions — they never
  import it directly.
-->
<script type="module">
/*
 * Global error handlers — catch uncaught exceptions and unhandled promise
 * rejections, display them in the status HUD (bottom-right corner).
 * Critical for debugging on macOS/Safari where dev console may not be open.
 */
window.addEventListener('error', e => {
    const el = document.getElementById('status');
    if (el) el.textContent = `ERR: ${e.message} @ ${e.filename}:${e.lineno}`;
});
window.addEventListener('unhandledrejection', e => {
    const el = document.getElementById('status');
    if (el) el.textContent = `ERR: ${e.reason}`;
});

/* ── Module Imports ── */
import * as THREE from 'three';
import { GLTFLoader } from './lib/GLTFLoader.js?v=30';   // glTF 2.0 loader
import { DRACOLoader } from './lib/DRACOLoader.js?v=30';  // Draco mesh compression
import { M } from './src/math.js';                        // 3x3 matrix operations
import { SCENE_CAM, DEF_CAM } from './src/camera.js';     // Default camera parameters
import { computeH, zoomMatrix } from './src/homography.js'; // Homography + zoom math
import { initLoader, loadScene, getLoaderState, resetPositions } from './src/loader.js';
import { renderCamDialog, readCamInputs, readSceneInputs, bindDialog } from './src/camera-dialog.js';
import { createWarpMaterial } from './src/shader.js';      // Warp shader material factory
import { createPanelManager } from './src/panels.js';      // Panel layout manager
import { initInteraction } from './src/interaction.js';    // Object selection + drag
import { initAutofocus } from './src/autofocus.js';        // Autofocus rectangle + depth

/* ── Helpers ── */
const $ = id => document.getElementById(id);
function log(msg) { $('status').textContent = msg; console.log('[VS]', msg); }
log('Three.js loaded');

/**
 * Nudge a range slider by ±0.1, clamped to [min, max].
 * Exposed on window so inline onclick="nudge(...)" in HTML buttons can call it.
 * Dispatches 'input' event so the slider's oninput handler fires.
 * @param {string} id  - DOM id of the <input type="range">
 * @param {number} dir - Direction: +1 or -1
 */
window.nudge = function(id, dir) {
    const s = $(id);
    if (s.disabled) return;
    const v = Math.min(parseFloat(s.max), Math.max(parseFloat(s.min), parseFloat(s.value) + dir * 0.1));
    s.value = v;
    s.dispatchEvent(new Event('input'));
};

/* ================================================================
   STATE — Single source of truth for all mutable application state.
   Passed to modules via dependency injection.
   ================================================================ */
const S = {
    warp: false,           // Whether homography warp is active in Combined panel
    zoom: 1.0,             // Current zoom level (0.5 = zoom out, 2.0 = zoom in)
    prewarpScale: 1.0,     // Pre-warp scale applied to secondary camera before homography
    depthD: 3.0,           // Focus depth D for the homography plane (meters)
    sel: null,             // Currently selected Three.js object (or null)
    dragging: false,       // Whether user is currently dragging an object
    dragPlane: new THREE.Plane(),   // Plane constraint for object dragging
    dragOff: new THREE.Vector3(),   // Offset from drag hit point to object origin
    objs: [],              // Array of selectable scene objects (synced from loader)
    origPos: new Map(),    // Map<uuid, Vector3> — original positions for reset
    camParams: null,       // Current camera parameters (set by initCams)
};

/* ================================================================
   RENDERER SETUP
   - powerPreference: 'default' (not 'high-performance') for macOS compat
   - failIfMajorPerformanceCaveat: false — allow software fallback
   - pixelRatio capped at 2 to limit GPU load on HiDPI displays
   - autoClear: false — we clear manually per-panel with scissor test
   - outputColorSpace: sRGB — must NOT be switched mid-frame (breaks macOS Metal)
   - WebGL context loss handler prevents blank screen on GPU timeout
   ================================================================ */
const canvas = $('main-canvas');
let renderer;
try {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'default', failIfMajorPerformanceCaveat: false });
} catch (e) {
    log(`WebGL failed: ${e.message}. Try chrome://flags → #use-angle → OpenGL`);
    throw e;
}
canvas.addEventListener('webglcontextlost', (e) => { log('WebGL context lost — GPU may be overloaded'); e.preventDefault(); });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x1a1a2e);
renderer.autoClear = false;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a3e);

const aLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(aLight);
const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
dLight.position.set(5, 8, 5);
scene.add(dLight);

/* ── Camera Construction ──
 * RT_W × RT_H defines the render target resolution (16:9).
 * Both cameras use PerspectiveCamera with FOV derived from intrinsics:
 *   fov = 2 * atan(imageHeight / (2 * fy))
 * This ensures the Three.js projection matches the camera intrinsic matrix K.
 */
const RT_W = 1920, RT_H = 1080;
let mainCam, secCam;

/**
 * Create a PerspectiveCamera whose vertical FOV matches the given intrinsics.
 * The FOV is derived from fy (vertical focal length in pixels) and image height.
 * @param {{ fx: number, fy: number, cx: number, cy: number }} intrinsics
 * @param {number[]} imageSize - [width, height] in pixels
 * @returns {THREE.PerspectiveCamera}
 */
function makeCamFromIntrinsics(intrinsics, imageSize) {
    const { fy } = intrinsics;
    const [, h] = imageSize;
    const fov = 2 * Math.atan(h / (2 * fy)) * 180 / Math.PI;
    return new THREE.PerspectiveCamera(fov, 4/3, 0.01, 500);
}

/**
 * Initialize (or re-initialize) both cameras from camera parameters.
 *
 * Main camera is placed at SCENE_CAM world position/rotation.
 * Secondary camera is placed relative to main camera using its extrinsics:
 *   worldPos = mainCam.quaternion * relativePosition + mainCam.position
 *   worldRot = mainCam.quaternion * relativeQuaternion
 *
 * @param {object} p - Camera params { main_camera, secondary_camera }
 */
function initCams(p) {
    if (mainCam) { scene.remove(mainCam); scene.remove(secCam); }
    S.camParams = p;
    mainCam = makeCamFromIntrinsics(p.main_camera.intrinsics, p.main_camera.image_size);
    mainCam.position.set(...SCENE_CAM.position);
    const [rx, ry, rz] = SCENE_CAM.rotation_euler_deg.map(d => d * Math.PI / 180);
    mainCam.rotation.set(rx, ry, rz, 'ZYX');

    secCam = makeCamFromIntrinsics(p.secondary_camera.intrinsics, p.secondary_camera.image_size);
    const relPos = new THREE.Vector3(...p.secondary_camera.extrinsics.position);
    const worldPos = relPos.applyQuaternion(mainCam.quaternion).add(mainCam.position);
    secCam.position.copy(worldPos);
    const relRot = p.secondary_camera.extrinsics.rotation_euler_deg.map(d => d * Math.PI / 180);
    const relQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(relRot[0], relRot[1], relRot[2], 'ZYX'));
    secCam.quaternion.copy(mainCam.quaternion).multiply(relQuat);

    scene.add(mainCam);
    scene.add(secCam);
}
initCams(DEF_CAM);

/* ── Render Targets ──
 * rtM / rtS: Main and Secondary camera renders at full RT resolution (1920x1080).
 *            Used as texture inputs to the Combined panel's warp shader.
 * rtDepth:   Depth pass output for Autofocus. Uses default UnsignedByteType
 *            (not FloatType) for cross-platform GPU compatibility.
 * depthMat:  MeshDepthMaterial with RGBADepthPacking — encodes depth as RGBA
 *            bytes for reliable readback via readRenderTargetPixels().
 */
const rtM = new THREE.WebGLRenderTarget(RT_W, RT_H);
const rtS = new THREE.WebGLRenderTarget(RT_W, RT_H);
const rtDepth = new THREE.WebGLRenderTarget(RT_W, RT_H);
const depthMat = new THREE.MeshDepthMaterial({ depthPacking: THREE.RGBADepthPacking });

/* ── Display Quad + Warp Material ──
 * A fullscreen quad rendered with an OrthographicCamera in a separate scene (dScene).
 * The warp ShaderMaterial (matWarp) samples rtM/rtS textures and applies the
 * inverse homography transform in pixel space. See src/shader.js for details.
 */
const dScene = new THREE.Scene();
const dCam = new THREE.OrthographicCamera(-0.5, 0.5, 0.5, -0.5, 0, 1);
const quad = new THREE.Mesh(new THREE.PlaneGeometry(1, 1));
dScene.add(quad);
const matWarp = createWarpMaterial(THREE, rtM.texture, rtS.texture, RT_W, RT_H);

/* ================================================================
   SCENE LOADING
   Initializes the glTF loader (with Draco support for compressed meshes)
   and attempts to load the default bedroom scene. Falls back to a
   procedurally generated scene (5 colored primitives + floor) if the
   asset fails to load or takes longer than 5 seconds.
   ================================================================ */
initLoader({ scene, GLTFLoader, DRACOLoader, dracoPath: './lib/draco/', ambientLight: aLight, directionalLight: dLight });

function doLoadScene(url, isDefault = false) {
    log('Loading scene…');
    loadScene(url, {
        isDefault,
        onProgress: (loaded, total) => log(`Loading ${(loaded / total * 100) | 0}%…`),
        onComplete: (count) => { const ls = getLoaderState(); S.objs = ls.objs; S.origPos = ls.origPos; log(`Loaded: ${count} objects`); },
        onError: () => { if (isDefault && !getLoaderState().loaded) { addFallback(); log('Fallback scene'); } },
    });
}

function addFallback() {
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(12, 12), new THREE.MeshStandardMaterial({ color: 0x3a3a5c }));
    floor.rotation.x = -Math.PI / 2;
    scene.add(floor);
    const ls = getLoaderState();
    [[0xe94560,[-1.2,.4,2],'Red Cube',new THREE.BoxGeometry(.8,.8,.8)],
     [0x533483,[1,.5,3.5],'Purple Sphere',new THREE.SphereGeometry(.5,32,32)],
     [0x0f3460,[0,.55,1],'Blue Torus',new THREE.TorusGeometry(.35,.12,16,48)],
     [0x16c79a,[2,.5,4],'Green Cone',new THREE.ConeGeometry(.35,1,32)],
     [0xf5a623,[-2,.5,3.5],'Orange Cyl',new THREE.CylinderGeometry(.25,.25,1,32)],
    ].forEach(([c,p,n,g]) => {
        const m = new THREE.Mesh(g, new THREE.MeshStandardMaterial({ color: c, roughness: .3 }));
        m.position.set(...p); m.name = n; scene.add(m);
        ls.objs.push(m); ls.origPos.set(m.uuid, m.position.clone());
    });
    S.objs = ls.objs; S.origPos = ls.origPos; ls.loaded = true;
}

doLoadScene('assets/bedroom.glb', true);
setTimeout(() => { if (!getLoaderState().loaded) { addFallback(); log('Fallback scene'); } }, 5000);

/* ================================================================
   PANELS — Three-panel layout manager.
   Returns GL-coordinate rects (P.m, P.s, P.c) for Main, Secondary,
   and Combined panels. The onCameraAspect callback syncs both cameras'
   aspect ratios to match the panel dimensions on each layout change.
   ================================================================ */
const { P, layoutPanels, getPanel, toNDC } = createPanelManager({
    $, RT_W, RT_H,
    onCameraAspect: (aspect) => {
        if (mainCam) { mainCam.aspect = aspect; mainCam.updateProjectionMatrix(); }
        if (secCam)  { secCam.aspect = aspect; secCam.updateProjectionMatrix(); }
    },
});

/* ================================================================
   INTERACTION — Object selection and depth-plane drag.
   Injects getMainCam/getSecCam as closures so the interaction module
   always uses the current camera (which may be re-created by initCams).
   Returns sel() for programmatic selection and syncDepthSlider() for
   updating the Obj Depth slider after external position changes.
   ================================================================ */
const { sel, syncDepthSlider } = initInteraction({
    THREE, canvas, scene, S, P,
    getMainCam: () => mainCam, getSecCam: () => secCam,
    getPanel, toNDC, $,
});

/* ================================================================
   AUTOFOCUS — Interactive rectangle selection + depth sampling.
   When AF completes, the onFocus callback updates the Focus D state,
   slider, display value, and recomputes the homography.
   ================================================================ */
initAutofocus({
    $, canvas, renderer, scene, depthMat, rtDepth, P, RT_W, RT_H,
    getMainCam: () => mainCam,
    onFocus: (focusD) => {
        S.depthD = focusD;
        $('sld-d').value = focusD;
        $('vd').textContent = focusD.toFixed(1);
        refreshH();
    },
});

/* ================================================================
   UI CONTROLS
   Each slider/button updates the corresponding field in state S,
   updates the display value, and calls refreshH() to recompute
   the homography and update shader uniforms.
   ================================================================ */

/* Focus D slider: controls the depth of the homography focal plane */
$('sld-d').oninput = function () { S.depthD = +this.value; $('vd').textContent = S.depthD.toFixed(1); refreshH(); };

/* Prewarp scale slider: applies a pre-scale to secondary camera */
$('sld-pw').oninput = function () { S.prewarpScale = +this.value; $('vpw').textContent = S.prewarpScale.toFixed(2) + 'x'; refreshH(); };

/* Zoom slider: controls zoom level in Combined panel.
 * Zoom ≤ 1 shows the secondary (wider FOV) camera.
 * Zoom > 1 shows the main (narrower FOV) camera. */
$('sld-z').oninput = function () {
    S.zoom = +this.value;
    $('vz').textContent = S.zoom.toFixed(2) + 'x';
    const src = S.zoom <= 1 ? 'Sec' : 'Main';
    $('lbl-c').textContent = `\u25CE Combined — ${src} @ ${S.zoom.toFixed(2)}x`;
    refreshH();
};

/* Warp toggle: when ON, the Combined panel applies the inverse homography H⁻¹
 * to align the secondary camera image with the main camera's perspective.
 * When OFF, only the prewarp scale S is applied (identity if prewarp = 1.0). */
$('btn-warp').onclick = () => {
    S.warp = !S.warp;
    $('btn-warp').classList.toggle('active', S.warp);
    $('btn-warp').textContent = S.warp ? 'Warp ON' : 'Warp';
    refreshH();
};

/* Play button: animates zoom 0.5 → 2.0 → 0.5 continuously using
 * requestAnimationFrame. Useful for visualizing how the homography
 * warp transitions between the two camera feeds across zoom levels. */
let playAnim = null;
$('btn-play').onclick = () => {
    if (playAnim) { cancelAnimationFrame(playAnim); playAnim = null; $('btn-play').classList.remove('active'); $('btn-play').textContent = '\u25B6 Play'; return; }
    $('btn-play').classList.add('active'); $('btn-play').textContent = '\u25A0 Stop';
    let dir = 1;
    function tick() {
        S.zoom += 0.008 * dir;
        if (S.zoom >= 2.0) { S.zoom = 2.0; dir = -1; }
        if (S.zoom <= 0.5) { S.zoom = 0.5; dir = 1; }
        $('sld-z').value = S.zoom; $('vz').textContent = S.zoom.toFixed(2) + 'x';
        $('lbl-c').textContent = `\u25CE Combined — ${S.zoom <= 1 ? 'Sec' : 'Main'} @ ${S.zoom.toFixed(2)}x`;
        refreshH();
        playAnim = requestAnimationFrame(tick);
    }
    playAnim = requestAnimationFrame(tick);
};

/* Object depth slider: moves the selected object along the main camera's
 * view direction (Z-axis in camera space). Computes the current depth as
 * the dot product of (objectCenter - camPosition) with the view direction,
 * then translates by the delta to reach the target depth. */
$('sld-od').oninput = function () {
    if (!S.sel) return;
    const target = +this.value; $('vod').textContent = target.toFixed(1);
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(mainCam.quaternion);
    const c = new THREE.Vector3(); new THREE.Box3().setFromObject(S.sel).getCenter(c);
    S.sel.position.addScaledVector(dir, target - c.sub(mainCam.position).dot(dir));
};

/* Reset all: restore objects to original positions, deselect, reset all
 * sliders/state to defaults, recompute homography. */
$('btn-reset').onclick = () => {
    resetPositions(); sel(null);
    S.depthD = 3; $('sld-d').value = 3; $('vd').textContent = '3.0';
    S.zoom = 1; $('sld-z').value = 1; $('vz').textContent = '1.00x';
    S.warp = false; $('btn-warp').classList.remove('active'); $('btn-warp').textContent = 'Warp';
    $('lbl-c').textContent = '\u25CE Combined — 1.00x';
    refreshH(); log('Reset done');
};

/* File inputs: Load Scene reads a .glb/.gltf file, Load Camera reads a .json file */
$('fscene').onchange = function () { if (this.files[0]) doLoadScene(URL.createObjectURL(this.files[0])); };
$('fcam').onchange = function () {
    if (!this.files[0]) return;
    const r = new FileReader();
    r.onload = ev => {
        try { initCams(JSON.parse(ev.target.result)); refreshH(); log('Cameras loaded');
            if (camDialogEl.classList.contains('open')) renderCamDialog($('cam-params-content'), { camParams: S.camParams, sceneCam: SCENE_CAM });
        } catch (e) { log('Bad JSON'); }
    };
    r.readAsText(this.files[0]);
};

/* ── Camera Settings Dialog ──
 * Live-editing: any input change immediately re-initializes cameras
 * and recomputes homography via the onApply callback. */
const camDialogEl = $('cam-dialog');
bindDialog(camDialogEl, {
    onApply: ({ camParams, sceneCam }) => {
        SCENE_CAM.position = sceneCam.position;
        SCENE_CAM.rotation_euler_deg = sceneCam.rotation_euler_deg;
        initCams(camParams); layoutPanels(); refreshH(); log('Camera params updated');
    },
});
window.openCamDialog = function() { renderCamDialog($('cam-params-content'), { camParams: S.camParams, sceneCam: SCENE_CAM }); camDialogEl.classList.add('open'); };
window.closeCamDialog = function() { camDialogEl.classList.remove('open'); };

/* ================================================================
   HOMOGRAPHY COMPUTATION & DISPLAY
   refreshH() is the central update function called whenever any
   parameter changes (depth, zoom, prewarp, warp toggle, cameras).

   Pipeline:
     1. Compute raw homography H at current depth D
     2. Compute prewarp scale matrix S
     3. Update shader uniforms:
        - Warp ON:  uHi = H⁻¹  (S is fully compensated in the math)
        - Warp OFF: uHi = S     (just apply prewarp scale visually)
     4. Compute H_effective for the HUD display:
        - Warp ON:  H_eff = Z⁻¹ · H  (zoom inverse × homography)
        - Warp OFF: H_eff = Z⁻¹ · S⁻¹ (zoom inverse × prewarp inverse)
     5. Display H_eff as a formatted 3×3 matrix in the top-right HUD
   ================================================================ */

/**
 * Render a 3×3 matrix as a formatted string in the HUD overlay.
 * @param {number[]} H - 9-element row-major matrix
 * @param {string} [label] - Display label above the matrix
 */
function displayH(H, label) {
    const f = v => (v >= 0 ? ' ' : '') + v.toFixed(4);
    $('hmat').innerHTML = `<span style="color:#e94560">${label || 'H'}</span>\n` +
        `┌ ${f(H[0])}  ${f(H[1])}  ${f(H[2])} ┐\n` +
        `│ ${f(H[3])}  ${f(H[4])}  ${f(H[5])} │\n` +
        `└ ${f(H[6])}  ${f(H[7])}  ${f(H[8])} ┘`;
}

function refreshH() {
    if (!S.camParams) return;
    const H = computeH(S.camParams, S.depthD);
    const Sp = zoomMatrix(S.prewarpScale, RT_W, RT_H);
    const Hinv = M.inv(H);

    if (S.warp) {
        if (Hinv) matWarp.uniforms.uHi.value.set(Hinv[0],Hinv[1],Hinv[2],Hinv[3],Hinv[4],Hinv[5],Hinv[6],Hinv[7],Hinv[8]);
    } else {
        matWarp.uniforms.uHi.value.set(Sp[0],Sp[1],Sp[2],Sp[3],Sp[4],Sp[5],Sp[6],Sp[7],Sp[8]);
    }
    matWarp.uniforms.uZ.value = S.zoom;
    matWarp.uniforms.uW.value = S.warp || S.prewarpScale !== 1.0;
    matWarp.uniforms.uCrop.value = S.zoom;

    const Z = zoomMatrix(S.zoom, RT_W, RT_H);
    const Zi = M.inv(Z) || M.id();
    const Si = M.inv(Sp) || M.id();
    const H_eff = S.warp ? M.mul(Zi, H) : M.mul(Zi, Si);
    const s = H_eff[8];
    if (Math.abs(s) > 1e-10) for (let i = 0; i < 9; i++) H_eff[i] /= s;

    const src = S.zoom <= 1 ? 'Sec' : 'Main';
    const pw = S.prewarpScale !== 1.0 ? ` PW=${S.prewarpScale.toFixed(2)}` : '';
    displayH(H_eff, `H_applied (D=${S.depthD.toFixed(1)} Z=${S.zoom.toFixed(2)}${pw} ${src})`);
}
refreshH();

/* ================================================================
   RESIZE + RENDER LOOP

   Resize handler: updates renderer size and recalculates panel layout.

   Render loop: 5 render passes per frame.
   ┌──────────────────────────────────────────────────────────────┐
   │ Pass 1: Render scene → rtM  (main cam, 1920×1080 RT)       │
   │ Pass 2: Render scene → rtS  (sec cam, 1920×1080 RT)        │
   │ Pass 3: Render scene → Main panel (direct, panel aspect)    │
   │ Pass 4: Render scene → Secondary panel (direct, panel asp)  │
   │ Pass 5: Render warp quad → Combined panel (shader reads     │
   │         rtM/rtS textures, applies homography warp)          │
   └──────────────────────────────────────────────────────────────┘

   Why 5 passes instead of 3?
   - Passes 1-2 render at fixed 16:9 RT resolution for the warp shader
     (which needs random-access pixel sampling via homography matrix).
   - Passes 3-4 render directly to screen at panel aspect ratio.
     We cannot reuse the RT textures for Main/Secondary because:
     (a) Switching outputColorSpace mid-frame breaks macOS Metal backend
     (b) RT aspect (16:9) may differ from panel aspect → distortion

   Camera aspect is set to rtAspect for RT passes, then panelAspect
   for direct passes. updateProjectionMatrix() is called after each change.
   ================================================================ */
function onResize() { const r = $('viewport-container').getBoundingClientRect(); renderer.setSize(r.width, r.height); layoutPanels(); }
window.addEventListener('resize', onResize);
onResize();

function frame() {
    requestAnimationFrame(frame);
    mainCam.updateMatrixWorld(true);
    secCam.updateMatrixWorld(true);
    const rtAspect = RT_W / RT_H;

    /* Pass 1-2: Off-screen RT renders for the Combined warp shader */
    mainCam.aspect = rtAspect; mainCam.updateProjectionMatrix();
    renderer.setRenderTarget(rtM); renderer.clear(); renderer.render(scene, mainCam);
    secCam.aspect = rtAspect; secCam.updateProjectionMatrix();
    renderer.setRenderTarget(rtS); renderer.clear(); renderer.render(scene, secCam);

    /* Pass 3-5: On-screen panel renders with scissor test */
    renderer.setRenderTarget(null); renderer.clear(); renderer.setScissorTest(true);

    /* Pass 3: Main panel — direct scene render */
    const panelAspect = P.m.w / P.m.h;
    mainCam.aspect = panelAspect; mainCam.updateProjectionMatrix();
    renderer.setViewport(P.m.x, P.m.y, P.m.w, P.m.h); renderer.setScissor(P.m.x, P.m.y, P.m.w, P.m.h);
    renderer.render(scene, mainCam);

    /* Pass 4: Secondary panel — direct scene render */
    secCam.aspect = panelAspect; secCam.updateProjectionMatrix();
    renderer.setViewport(P.s.x, P.s.y, P.s.w, P.s.h); renderer.setScissor(P.s.x, P.s.y, P.s.w, P.s.h);
    renderer.render(scene, secCam);

    /* Pass 5: Combined panel — warp shader on fullscreen quad */
    renderer.setViewport(P.c.x, P.c.y, P.c.w, P.c.h); renderer.setScissor(P.c.x, P.c.y, P.c.w, P.c.h);
    quad.material = matWarp; renderer.render(dScene, dCam);

    renderer.setScissorTest(false);
}
frame();

</script>
</body>
</html>
