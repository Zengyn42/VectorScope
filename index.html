<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VectorScope — Stereo Camera Homography Visualizer</title>
<!--
  VectorScope — Stereo Camera Homography Visualizer
  ==================================================
  Two-row layout:
    Top row:    Bird's Eye (canvas) | Object Info (DOM) | Controls (DOM)
    Bottom row: Main Camera | Secondary 1 | Secondary 2 | Combined (all canvas)

  See architecture.md for the full system design document.
-->
<style>
/* ── Global Reset & Body ── */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e; color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden; height: 100vh; user-select: none;
}

/* ── App Layout: single viewport fills the entire window ── */
#app { display: flex; flex-direction: column; height: 100vh; }
#viewport-container { flex: 1; position: relative; overflow: hidden; }
#main-canvas { display: block; width: 100%; height: 100%; }

/* ── DOM Overlay Panels (top row: info + controls) ── */
#panel-info, #panel-controls {
    position: absolute;
    background: rgba(22, 33, 62, 0.92);
    border-left: 1px solid #0f3460;
    border-bottom: 1px solid #0f3460;
    padding: 10px 12px;
    overflow-y: auto;
    z-index: 10;
    /* JS sets left, top, width, height */
}
#panel-info .panel-title, #panel-controls .panel-title {
    font-size: 11px; color: #888; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 8px;
}

/* ── Control rows inside the controls panel ── */
.ctrl-row {
    display: flex; align-items: center; gap: 4px;
    margin-bottom: 6px; flex-wrap: wrap;
}

/* ── Shared UI elements ── */
.cg { display: flex; align-items: center; gap: 3px; }
label { font-size: 12px; color: #aaa; }
button {
    padding: 3px 10px; background: #0f3460; color: #e0e0e0;
    border: 1px solid #533483; border-radius: 4px; cursor: pointer;
    font-size: 12px; transition: background .15s;
}
button:hover { background: #533483; }
button.active { background: #e94560; border-color: #e94560; }
.sld-btn {
    padding: 1px 6px; font-size: 14px; line-height: 1;
    background: #0f3460; border: 1px solid #533483; border-radius: 3px;
    color: #e0e0e0; cursor: pointer; font-weight: bold;
}
.sld-btn:hover { background: #533483; }
.zp-btn { padding: 2px 7px; font-size: 11px; font-family: monospace; }
.zp-btn.active { background: #e94560; border-color: #e94560; }
input[type="range"] { width: 100px; accent-color: #e94560; }
input[type="file"] { display: none; }
.val {
    min-width: 40px; text-align: right; font-size: 12px;
    color: #e94560; font-family: monospace;
}
.sep { width: 1px; height: 18px; background: #0f3460; }
#selinfo { font-size: 12px; color: #aaa; }
/* Inline camera parameter inputs in info panel */
.cam-inp {
    width: 58px; padding: 1px 4px; margin: 0 2px;
    background: #0a0f1e; color: #e0e0e0; border: 1px solid #533483;
    border-radius: 3px; font-family: monospace; font-size: 11px; text-align: right;
}
.cam-inp:focus { outline: none; border-color: #e94560; }
.cam-lbl { color: #888; font-size: 10px; margin-right: 1px; }

/* ── Panel labels: positioned absolutely over the canvas ── */
.plbl {
    position: absolute; padding: 3px 10px;
    background: rgba(15,52,96,.85); border-radius: 3px;
    font-size: 11px; pointer-events: none; z-index: 10; white-space: nowrap;
}

/* ── Red border outline around each camera view ── */
.pborder {
    position: absolute; box-sizing: border-box;
    border: 2px solid #ff2b2b;
    pointer-events: none; z-index: 8;
}

/* ── Panel separators ── */
.panel-sep-v {
    position: absolute; top: 0; width: 2px;
    background: #e94560; pointer-events: none; z-index: 5; opacity: 0.7;
}
.panel-sep-h {
    position: absolute; left: 0; width: 100%; height: 2px;
    background: #e94560; pointer-events: none; z-index: 5; opacity: 0.7;
}

/* ── Homography Matrix HUD (top-right of Combined panel) ── */
#hmat {
    position: fixed; bottom: 16px; right: 16px;
    padding: 8px 12px; background: rgba(15,52,96,.92);
    border: 1px solid #533483; border-radius: 6px;
    font-family: monospace; font-size: 11px; color: #e0e0e0;
    pointer-events: none; z-index: 20; white-space: pre; line-height: 1.5;
}
/* ── Status HUD ── */
#status {
    position: fixed; bottom: 100px; right: 16px;
    padding: 4px 10px; background: rgba(15,52,96,.9);
    border-radius: 4px; font-size: 11px; color: #888;
    pointer-events: none; z-index: 20;
}

/* ── Camera Settings Dialog ── */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,.6); z-index: 100; justify-content: center; align-items: center;
}
.modal-overlay.open { display: flex; }
.modal {
    background: #16213e; border: 1px solid #533483; border-radius: 8px;
    padding: 20px; min-width: 520px; max-width: 90vw; max-height: 85vh;
    overflow-y: auto; color: #e0e0e0; font-size: 13px;
}
.modal h2 { margin: 0 0 14px; font-size: 16px; color: #e94560; }
.modal h3 { margin: 12px 0 6px; font-size: 13px; color: #4fc3f7; border-bottom: 1px solid #0f3460; padding-bottom: 4px; }
.modal table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
.modal td { padding: 3px 8px; font-family: monospace; font-size: 12px; }
.modal td:first-child { color: #aaa; width: 140px; }
.modal td:last-child { color: #e0e0e0; }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
.modal-actions button { padding: 6px 16px; }
.modal input[type="number"] {
    width: 80px; padding: 2px 6px; background: #0a0f1e; color: #e0e0e0;
    border: 1px solid #533483; border-radius: 3px; font-family: monospace;
    font-size: 12px; text-align: right;
}
.modal input[type="number"]:focus { outline: none; border-color: #e94560; }
.cam-field { display: inline-flex; align-items: center; gap: 4px; }
.cam-field label { color: #888; font-size: 11px; min-width: 14px; }
</style>
</head>
<body>
<div id="app">
  <div id="viewport-container">
    <canvas id="main-canvas"></canvas>

    <!-- Top row: DOM overlay panels (info + controls) -->
    <div id="panel-info">
      <div class="panel-title">Selection</div>
      <div class="ctrl-row" style="margin-bottom:8px">
        <label>Ghost Y:</label>
        <button class="sld-btn" onclick="nudge('sld-clip',-1)">&minus;</button>

      <div class="ctrl-row">

        <input type="range" id="sld-d" min="0.1" max="10" step="0.1" value="3">
        <button class="sld-btn" onclick="nudge('sld-d',1)">+</button>
        <span class="val" id="vd">3.0</span>
        <button id="btn-af" class="sld-btn" style="margin-left:4px;width:auto;padding:0 6px">AF</button>
      </div>
      <div class="ctrl-row">
        <label>Prewarp1:</label>
        <button class="sld-btn" onclick="nudge('sld-pw',-1)">&minus;</button>
        <input type="range" id="sld-pw" min="0.25" max="4.0" step="0.01" value="1.0">
        <button class="sld-btn" onclick="nudge('sld-pw',1)">+</button>
        <span class="val" id="vpw">1.00x</span>
      </div>
      <div class="ctrl-row">
        <label>Prewarp2:</label>
        <button class="sld-btn" onclick="nudge('sld-pw2',-1)">&minus;</button>
        <input type="range" id="sld-pw2" min="0.25" max="4.0" step="0.01" value="1.0">
        <button class="sld-btn" onclick="nudge('sld-pw2',1)">+</button>
        <span class="val" id="vpw2">1.00x</span>
      </div>
      <div class="ctrl-row">
        <label>Zoom:</label>
        <button class="sld-btn" onclick="nudge('sld-z',-1)">&minus;</button>
        <!-- log10 scale: -0.30103 → 0.5x, 0 → 1x, 1 → 10x -->
        <input type="range" id="sld-z" min="-0.30103" max="1" step="0.001" value="0">
        <button class="sld-btn" onclick="nudge('sld-z',1)">+</button>
        <span class="val" id="vz">1.00x</span>
      </div>
      <div class="ctrl-row" id="zoom-presets">
        <label>Go:</label>
        <button class="zp-btn" data-z="0.5">0.5x</button>
        <button class="zp-btn" data-z="1">1.0x</button>
        <button class="zp-btn" data-z="2">2.0x</button>
        <button class="zp-btn" data-z="5">5.0x</button>
        <button class="zp-btn" data-z="10">10x</button>
      </div>
      <div class="ctrl-row">
        <label>Blend:</label>
        <button class="sld-btn" onclick="nudge('sld-blend',-10)">&minus;</button>
        <!-- X = cross-fade length in frames after a camera switch; 0 = off -->
        <input type="range" id="sld-blend" min="0" max="60" step="1" value="20">
        <button class="sld-btn" onclick="nudge('sld-blend',10)">+</button>
        <span class="val" id="vblend">20f</span>
      </div>
      <div class="ctrl-row">
        <button id="btn-warp">Warp</button>
        <button id="btn-play">&#9654; Play</button>
      </div>
    </div>

    <!-- Panel labels (positioned by panels.js) -->
    <div class="plbl" id="lbl-bev" style="color:#ffb74d">&#9678; Bird's Eye</div>
    <div class="plbl" id="lbl-m" style="color:#4fc3f7">&#9678; Main Camera</div>
    <div class="plbl" id="lbl-s1" style="color:#81c784">&#9678; Secondary 1</div>
    <div class="plbl" id="lbl-s2" style="color:#fff176">&#9678; Secondary 2</div>
    <div class="plbl" id="lbl-c" style="color:#e94560">&#9678; Combined &mdash; 1.00x</div>

    <!-- Separators -->
    <div class="panel-sep-h" id="sep-h"></div>
    <div class="panel-sep-v" id="sep-v1"></div>
    <div class="panel-sep-v" id="sep-v2"></div>
    <div class="panel-sep-v" id="sep-v3"></div>

    <!-- Red border outlines around each camera view (positioned by panels.js) -->
    <div class="pborder" id="bd-bev"></div>
    <div class="pborder" id="bd-m"></div>
    <div class="pborder" id="bd-s1"></div>
    <div class="pborder" id="bd-s2"></div>
    <div class="pborder" id="bd-c"></div>

    <!-- AF selection rectangle overlay -->
    <div id="af-rect" style="display:none;position:absolute;border:2px solid #e94560;background:rgba(233,69,96,.15);pointer-events:none;z-index:15;"></div>
  </div>
</div>

<!-- Camera Settings Dialog -->
<div class="modal-overlay" id="cam-dialog">
  <div class="modal">
    <h2>Camera Parameters</h2>
    <div id="cam-params-content"></div>
    <div class="modal-actions">
      <button onclick="document.getElementById('fcam').click()">Load Camera JSON</button>
      <button onclick="closeCamDialog()">Close</button>
    </div>
  </div>
</div>
<div id="hmat"></div>
<div id="status">Loading&hellip;</div>

<!-- WebGL Pre-flight Check (must run before module imports) -->
<script>

    var gl = c.getContext('webgl2') || c.getContext('webgl') || c.getContext('experimental-webgl');
    if (!gl) {

        msg.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);' +

<script type="importmap">
{ "imports": { "three": "./lib/three.module.js?v=29" } }
</script>

<script type="module">
/* ── Error Handlers ── */
window.addEventListener('error', e => {
    const el = document.getElementById('status');
    if (el) el.textContent = `ERR: ${e.message} @ ${e.filename}:${e.lineno}`;
});
window.addEventListener('unhandledrejection', e => {
    const el = document.getElementById('status');
    if (el) el.textContent = `ERR: ${e.reason}`;
});

/* ── Module Imports ── */
import * as THREE from 'three';
import { GLTFLoader } from './lib/GLTFLoader.js?v=30';
import { DRACOLoader } from './lib/DRACOLoader.js?v=30';
import { SCENE_CAM, DEF_CAM } from './src/camera.js';
import { SRC, computeSampleMatrix, zoomSource, segName } from './src/zoom-pipeline.js';
import { createBlendController } from './src/blend.js';
import { createZoomAnimator } from './src/zoom-anim.js';
import { createCameraRig } from './src/camera-rig.js';
import { createBevGhost } from './src/bev-ghost.js';
import { createFallbackScene } from './src/fallback-scene.js';
import { initLoader, loadScene, getLoaderState, resetPositions } from './src/loader.js';
import { renderCamDialog, readCamInputs, readSceneInputs, bindDialog } from './src/camera-dialog.js';
import { createWarpMaterial } from './src/shader.js';
import { createPanelManager } from './src/panels.js';
import { initInteraction } from './src/interaction.js';
import { initSelectionPanel } from './src/selection-panel.js';
import { initAutofocus } from './src/autofocus.js';

/* ── Helpers ── */
const $ = id => document.getElementById(id);
function log(msg) { $('status').textContent = msg; console.log('[VS]', msg); }
log('Three.js loaded');

/** Nudge a slider by ±0.1, clamped to [min, max]. */
window.nudge = function(id, dir) {
    const s = $(id);
    if (s.disabled) return;
    const v = Math.min(parseFloat(s.max), Math.max(parseFloat(s.min), parseFloat(s.value) + dir * 0.1));
    s.value = v;
    s.dispatchEvent(new Event('input'));
};

/* ================================================================
   STATE
   ================================================================ */
const S = {
    warp: false, zoom: 1.0, prewarpScale: 1.0, prewarpScale2: 1.0, depthD: 3.0,
    clipY: 2.0,            // BEV clipping plane height
    blendX: 20,            // camera-transition blend length in frames (0 = off)
    sampleSrc: SRC.MAIN, sampleM: null,   // current frame's sampling state (set by refreshH)
    sel: null, selCam: null, // selected object / selected camera name
    dragging: false,
    dragPlane: new THREE.Plane(), dragOff: new THREE.Vector3(),
    objs: [], origPos: new Map(), camParams: null,
};

/* ================================================================
   RENDERER
   ================================================================ */
const canvas = $('main-canvas');
let renderer;
try {
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'default', failIfMajorPerformanceCaveat: false });
} catch (e) {
    log(`WebGL failed: ${e.message}`);
    throw e;
}
canvas.addEventListener('webglcontextlost', (e) => { log('WebGL context lost'); e.preventDefault(); });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x1a1a2e);
renderer.autoClear = false;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a3e);

const aLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(aLight);
const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
dLight.position.set(5, 8, 5);
scene.add(dLight);

/* ================================================================
   CAMERAS
   - R.main, R.sec1, R.sec2: PerspectiveCamera (from intrinsics)
   - R.bev: OrthographicCamera looking straight down for Bird's Eye
   - Camera markers: colored indicators on layer 1 (BEV-only)
   ================================================================ */
const RT_W = 1080, RT_H = 1920;   // portrait 9:16, matches camera windows

/* BEV Ghost Mode (src/bev-ghost.js): objects above S.clipY render
   semi-transparent in the BEV pass instead of blocking the view. */
const bevGhost = createBevGhost({ THREE, scene, getClipY: () => S.clipY });

/* Camera rig (src/camera-rig.js): main/sec1/sec2 + BEV camera + markers.
   R is a live object — init() reassigns its fields; always access by
   property (R.main), never destructure. */
const camRig = createCameraRig({ THREE, scene, SCENE_CAM, bevSize: 6 });
const R = camRig.rig;
function initCams(p) { camRig.init(p); S.camParams = p; }
initCams(DEF_CAM);

/* ── Render Targets ── */
const rtM = new THREE.WebGLRenderTarget(RT_W, RT_H);
const rtS = new THREE.WebGLRenderTarget(RT_W, RT_H);
const rtS2 = new THREE.WebGLRenderTarget(RT_W, RT_H);
const rtDepth = new THREE.WebGLRenderTarget(RT_W, RT_H);
const depthMat = new THREE.MeshDepthMaterial({ depthPacking: THREE.RGBADepthPacking });

/* ── Display Quad + Warp Material ── */
const dScene = new THREE.Scene();
const dCam = new THREE.OrthographicCamera(-0.5, 0.5, 0.5, -0.5, 0, 1);
const quad = new THREE.Mesh(new THREE.PlaneGeometry(1, 1));
dScene.add(quad);
const matWarp = createWarpMaterial(THREE, rtS.texture, rtM.texture, rtS2.texture, RT_W, RT_H);

/* Camera-transition blending (src/blend.js): after a source switch the
   Combined view cross-fades from the outgoing camera's frozen last frame
   to the live incoming camera over S.blendX frames. The outgoing RT is
   not re-rendered during the blend, so it holds its last frame for free. */
const blendCtl = createBlendController({ getX: () => S.blendX });

/* ================================================================
   SCENE LOADING
   ================================================================ */
initLoader({ scene, GLTFLoader, DRACOLoader, dracoPath: './lib/draco/', ambientLight: aLight, directionalLight: dLight });

function doLoadScene(url, isDefault = false) {
    log('Loading scene…');
    loadScene(url, {
        isDefault,
        onProgress: (loaded, total) => log(`Loading ${(loaded / total * 100) | 0}%…`),
        onComplete: (count) => { removeFallback(); const ls = getLoaderState(); S.objs = ls.objs; S.origPos = ls.origPos; log(`Loaded: ${count} objects`); },
        onError: () => { if (isDefault && !getLoaderState().loaded) { addFallback(); log('Fallback scene'); } },
    });
}

/* ── Fallback placeholder scene (src/fallback-scene.js) ──
   Shown if the glb hasn't loaded within 5s (slow network). Fully removed
   once the real scene arrives — otherwise both scenes coexist (fallback
   race bug). Wrappers sync S.objs/S.origPos with the loader registry. */
const fallback = createFallbackScene({
    THREE, scene, getLoaderState,
    onRemove: (o) => { if (S.sel === o) sel(null); },
});
function addFallback() {
    fallback.add();
    const ls = getLoaderState(); S.objs = ls.objs; S.origPos = ls.origPos;
}
function removeFallback() {
    fallback.remove();
    const ls = getLoaderState(); S.objs = ls.objs; S.origPos = ls.origPos;
}

doLoadScene('assets/bedroom.glb', true);
setTimeout(() => { if (!getLoaderState().loaded) { addFallback(); log('Fallback scene'); } }, 5000);

/* ================================================================
   PANELS
   ================================================================ */
const { P, layoutPanels, getPanel, toNDC } = createPanelManager({
    $, RT_W, RT_H,
    onCameraAspect: (aspect) => {
        for (const c of [R.main, R.sec1, R.sec2]) {
            if (c) { c.aspect = aspect; c.updateProjectionMatrix(); }
        }
    },
});

/* ================================================================
   INTERACTION
   ================================================================ */

const { onSelChange } = initSelectionPanel({
    THREE, S, SCENE_CAM,
    getMainCam: () => R.main, getSecCam: () => R.sec1, getSecCam2: () => R.sec2,
    onCamEdit: () => { initCams(S.camParams); layoutPanels(); camRig.updateBevAspect(P.bev); refreshH(); },
    $,
});

const { sel, syncDepthSlider } = initInteraction({
    THREE, canvas, scene, S, P,
    getMainCam: () => R.main, getSecCam: () => R.sec1, getSecCam2: () => R.sec2,
    getBevCam: () => R.bev,
    getCamMarkers: () => R.markerMap,
    onSelChange,
    getPanel, toNDC, $,
});

/* ================================================================
   AUTOFOCUS
   ================================================================ */
initAutofocus({
    $, canvas, renderer, scene, depthMat, rtDepth, P, RT_W, RT_H,
    getMainCam: () => R.main,
    onFocus: (focusD) => {
        S.depthD = focusD;
        $('sld-d').value = focusD;
        $('vd').textContent = focusD.toFixed(1);
        refreshH();
    },
});

/* ================================================================
   UI CONTROLS
   ================================================================ */
$('sld-d').oninput = function () { S.depthD = +this.value; $('vd').textContent = S.depthD.toFixed(1); refreshH(); };
$('sld-pw').oninput = function () { S.prewarpScale = +this.value; $('vpw').textContent = S.prewarpScale.toFixed(2) + 'x'; refreshH(); };
$('sld-pw2').oninput = function () { S.prewarpScale2 = +this.value; $('vpw2').textContent = S.prewarpScale2.toFixed(2) + 'x'; refreshH(); };

function updateZoomUI() {
    $('vz').textContent = S.zoom.toFixed(2) + 'x';
    $('lbl-c').textContent = `\u25CE Combined \u2014 ${segName(S.zoom)} @ ${S.zoom.toFixed(2)}x`;
}
$('sld-z').oninput = function () {
    animator.stopPreset();        // manual drag overrides an in-flight preset animation
    S.zoom = 10 ** +this.value;   // slider is log10 scale
    updateZoomUI();
    refreshH();
};

$('sld-clip').oninput = function () {
    S.clipY = +this.value;
    $('vclip').textContent = S.clipY.toFixed(1);
};

$('sld-blend').oninput = function () {
    S.blendX = Math.round(+this.value);
    $('vblend').textContent = S.blendX + 'f';
};

$('btn-warp').onclick = () => {
    S.warp = !S.warp;
    $('btn-warp').classList.toggle('active', S.warp);
    $('btn-warp').textContent = S.warp ? 'Warp ON' : 'Warp';
    refreshH();
};

/* ── Zoom animation (src/zoom-anim.js): preset-button eased transitions
   + Play bounce loop, both in log-zoom space so perceived zoom speed is
   uniform across segments. */
const animator = createZoomAnimator({
    getZoom: () => S.zoom,
    setLogZoom: (lv) => {
        S.zoom = 10 ** lv;
        $('sld-z').value = lv;
        updateZoomUI();
        refreshH();
    },
    onPlayState: (playing) => {
        $('btn-play').classList.toggle('active', playing);
        $('btn-play').textContent = playing ? '\u25A0 Stop' : '\u25B6 Play';
    },
});
document.querySelectorAll('.zp-btn').forEach(b => {
    b.onclick = () => animator.animateTo(parseFloat(b.dataset.z));
});
$('btn-play').onclick = () => animator.togglePlay();

$('sld-od').oninput = function () {
    if (!S.sel) return;
    const target = +this.value; $('vod').textContent = target.toFixed(1);
    const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(R.main.quaternion);
    const c = new THREE.Vector3(); new THREE.Box3().setFromObject(S.sel).getCenter(c);
    S.sel.position.addScaledVector(dir, target - c.sub(R.main.position).dot(dir));
};

$('btn-reset').onclick = () => {
    animator.stopAll();
    blendCtl.reset(); matWarp.uniforms.uBlend.value = 1;
    resetPositions(); sel(null);
    S.depthD = 3; $('sld-d').value = 3; $('vd').textContent = '3.0';
    S.zoom = 1; $('sld-z').value = 0; $('vz').textContent = '1.00x';
    S.prewarpScale = 1; $('sld-pw').value = 1; $('vpw').textContent = '1.00x';
    S.prewarpScale2 = 1; $('sld-pw2').value = 1; $('vpw2').textContent = '1.00x';
    S.warp = false; $('btn-warp').classList.remove('active'); $('btn-warp').textContent = 'Warp';
    $('lbl-c').textContent = '\u25CE Combined \u2014 M @ 1.00x';
    refreshH(); log('Reset done');
};

$('fscene').onchange = function () { if (this.files[0]) doLoadScene(URL.createObjectURL(this.files[0])); };
$('fcam').onchange = function () {
    if (!this.files[0]) return;
    const r = new FileReader();
    r.onload = ev => {
        try { initCams(JSON.parse(ev.target.result)); refreshH(); log('Cameras loaded');
            if (camDialogEl.classList.contains('open')) renderCamDialog($('cam-params-content'), { camParams: S.camParams, sceneCam: SCENE_CAM });
        } catch (e) { log('Bad JSON'); }
    };
    r.readAsText(this.files[0]);
};

/* ── Camera Settings Dialog ── */
const camDialogEl = $('cam-dialog');
bindDialog(camDialogEl, {
    onApply: ({ camParams, sceneCam }) => {
        SCENE_CAM.position = sceneCam.position;
        SCENE_CAM.rotation_euler_deg = sceneCam.rotation_euler_deg;
        initCams(camParams); layoutPanels(); camRig.updateBevAspect(P.bev); refreshH(); log('Camera params updated');
    },
});
window.openCamDialog = function() { renderCamDialog($('cam-params-content'), { camParams: S.camParams, sceneCam: SCENE_CAM }); camDialogEl.classList.add('open'); };
window.closeCamDialog = function() { camDialogEl.classList.remove('open'); };

/* ================================================================
   HOMOGRAPHY
   ================================================================ */
function displayH(H, label) {
    const f = v => (v >= 0 ? ' ' : '') + v.toFixed(4);
    $('hmat').innerHTML = `<span style="color:#e94560">${label || 'H'}</span>\n` +
        `\u250C ${f(H[0])}  ${f(H[1])}  ${f(H[2])} \u2510\n` +
        `\u2502 ${f(H[3])}  ${f(H[4])}  ${f(H[5])} \u2502\n` +
        `\u2514 ${f(H[6])}  ${f(H[7])}  ${f(H[8])} \u2518`;
}

/* Sampling matrix + source selection live in src/zoom-pipeline.js (pure,
   unit-tested). This function pushes the result into shader uniforms and
   the H-matrix HUD. */
function refreshH() {
    if (!S.camParams) return;
    // If sec2 isn't materialized as a Three.js camera, hide it from the
    // pipeline so segments C/D fall back to a plain main-camera crop.
    const params = R.sec2 ? S.camParams : { ...S.camParams, secondary_camera_2: undefined };
    const { src, m: Msamp } = computeSampleMatrix({
        z: S.zoom, warp: S.warp, D: S.depthD, params,
        prewarp1: S.prewarpScale, prewarp2: S.prewarpScale2,
        w: RT_W, h: RT_H,
    });

    matWarp.uniforms.uSrc.value = src;
    matWarp.uniforms.uHi.value.set(
        Msamp[0], Msamp[1], Msamp[2],
        Msamp[3], Msamp[4], Msamp[5],
        Msamp[6], Msamp[7], Msamp[8]);
    // Stash the sampling state for the per-frame blend controller
    S.sampleSrc = src;
    S.sampleM = Msamp;

    const H_disp = Msamp.slice();
    const s = H_disp[8];
    if (Math.abs(s) > 1e-10) for (let i = 0; i < 9; i++) H_disp[i] /= s;
    displayH(H_disp, `M_sample (D=${S.depthD.toFixed(1)} Z=${S.zoom.toFixed(2)} ${segName(S.zoom)}${S.warp ? '' : ' raw'})`);
}
window.refreshH = refreshH;
refreshH();

// Debug/test hook (headless regression scripts inspect blend state)
window.VS_DEBUG = { matWarp, blendCtl, S };

/* ================================================================
   RESIZE + RENDER LOOP

   Render passes per frame:
     1. scene → rtM   (main cam @ RT res, for Combined warp shader)
     2. scene → rtS   (sec1 cam @ RT res, for Combined warp shader)
     3. scene → BEV panel     (R.bev, orthographic top-down)
     4. scene → Main panel    (R.main, direct)
     5. scene → Sec1 panel    (R.sec1, direct)
     6. scene → Sec2 panel    (R.sec2, direct)
     7. quad  → Combined panel (warp shader)
   ================================================================ */
function onResize() {
    const r = $('viewport-container').getBoundingClientRect();
    renderer.setSize(r.width, r.height);
    layoutPanels();
    camRig.updateBevAspect(P.bev);
}
window.addEventListener('resize', onResize);
onResize();

function frame() {
    requestAnimationFrame(frame);
    R.main.updateMatrixWorld(true);
    R.sec1.updateMatrixWorld(true);
    if (R.sec2) R.sec2.updateMatrixWorld(true);
    camRig.syncMarkers();

    const rtAspect = RT_W / RT_H;

    /* Pass 1: Off-screen RT render for the Combined warp shader.
       Only the source RT needed by the current zoom segment is rendered. */
    const zsrc = zoomSource(S.zoom, !!R.sec2);
    if (zsrc === SRC.SEC1) {
        R.sec1.aspect = rtAspect; R.sec1.updateProjectionMatrix();
        renderer.setRenderTarget(rtS); renderer.clear(); renderer.render(scene, R.sec1);
    } else if (zsrc === SRC.MAIN) {
        R.main.aspect = rtAspect; R.main.updateProjectionMatrix();
        renderer.setRenderTarget(rtM); renderer.clear(); renderer.render(scene, R.main);
    } else {
        R.sec2.aspect = rtAspect; R.sec2.updateProjectionMatrix();
        renderer.setRenderTarget(rtS2); renderer.clear(); renderer.render(scene, R.sec2);
    }

    /* Pass 2: camera-transition blend — advance the cross-fade and feed
       the frozen previous-camera sampling state into the warp shader. */
    if (S.sampleM) {
        const { t: blendT, prevSrc, prevM } = blendCtl.update(S.sampleSrc, S.sampleM);
        matWarp.uniforms.uBlend.value = blendT;
        if (prevSrc !== null) {
            matWarp.uniforms.uPrevSrc.value = prevSrc;
            matWarp.uniforms.uPrevHi.value.set(
                prevM[0], prevM[1], prevM[2],
                prevM[3], prevM[4], prevM[5],
                prevM[6], prevM[7], prevM[8]);
        }
    }

    /* Pass 3-7: On-screen panel renders */
    renderer.setRenderTarget(null); renderer.clear(); renderer.setScissorTest(true);

    /* Pass 3: Bird's Eye — top-down view; objects above ghost height are translucent */
    bevGhost.apply();
    renderer.setViewport(P.bev.x, P.bev.y, P.bev.w, P.bev.h);
    renderer.setScissor(P.bev.x, P.bev.y, P.bev.w, P.bev.h);
    renderer.render(scene, R.bev);
    bevGhost.restore();

    /* Pass 4: Main Camera panel */
    const panelAspect = P.m.w / P.m.h;
    R.main.aspect = panelAspect; R.main.updateProjectionMatrix();
    renderer.setViewport(P.m.x, P.m.y, P.m.w, P.m.h);
    renderer.setScissor(P.m.x, P.m.y, P.m.w, P.m.h);
    renderer.render(scene, R.main);

    /* Pass 5: Secondary 1 panel */
    R.sec1.aspect = panelAspect; R.sec1.updateProjectionMatrix();
    renderer.setViewport(P.s1.x, P.s1.y, P.s1.w, P.s1.h);
    renderer.setScissor(P.s1.x, P.s1.y, P.s1.w, P.s1.h);
    renderer.render(scene, R.sec1);

    /* Pass 6: Secondary 2 panel */
    if (R.sec2) {
        R.sec2.aspect = panelAspect; R.sec2.updateProjectionMatrix();
        renderer.setViewport(P.s2.x, P.s2.y, P.s2.w, P.s2.h);
        renderer.setScissor(P.s2.x, P.s2.y, P.s2.w, P.s2.h);
        renderer.render(scene, R.sec2);
    }

    /* Pass 7: Combined panel — warp shader on fullscreen quad.
       The quad shows a 16:9 RT texture; letterbox inside the panel so the
       image keeps the RT aspect instead of stretching to the panel shape. */
    let cx = P.c.x, cy = P.c.y, cw = P.c.w, ch = P.c.h;
    if (cw / ch > rtAspect) { const nw = ch * rtAspect; cx += (cw - nw) / 2; cw = nw; }
    else                    { const nh = cw / rtAspect; cy += (ch - nh) / 2; ch = nh; }
    renderer.setScissor(P.c.x, P.c.y, P.c.w, P.c.h);  // clear full panel (black bars)
    renderer.setViewport(cx, cy, cw, ch);
    quad.material = matWarp; renderer.render(dScene, dCam);

    renderer.setScissorTest(false);
}
frame();

</script>
</body>
</html>
